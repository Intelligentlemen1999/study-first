            py:'Yú Chūnshùn shì yī gè tànxiǎnjiā. Tā de lǐxiǎng shì túbù zǒu biàn Zhōngguó 960 wàn píngfāng gōnglǐ, shǐ měi gè shěngshì dōu liú xià tā de zújī.',
            en:'Yu Chunshun is an explorer. His aspiration was to walk on foot across all of China\'s 9.6 million square kilometres, leaving his footprints in every province and city.'
          },
          {
            zh:'从1988年7月1日起，余纯顺开始了"徒步走遍全中国"。他克服了千难万险，有时一天走33个小时，从南到北，从东到西，一共走了42万公里。了不起的是，他用一年半时间，一步一步地穿越了被称为"世界第三极"的青藏高原，克服了严重的高原反应，完成了这一项目。',
            py:'Cóng 1988 nián 7 yuè 1 rì qǐ, Yú Chūnshùn kāishǐ le "túbù zǒu biàn quán Zhōngguó". Tā kèfú le qiān nán wàn xiǎn, yǒushí yī tiān zǒu 33 gè xiǎoshí, cóng nán dào běi, cóng dōng dào xī, yīgòng zǒu le 42 wàn gōnglǐ. Liǎobuqǐ de shì, tā yòng yī nián bàn shíjiān, yī bù yī bù de chuānyuè le bèi chēng wèi "shìjiè dì-sān jí" de Qīngzàng Gāoyuán, kèfú le yánzhòng de gāoyuán fǎnyìng, wánchéng le zhè yī xiàngmù.',
            en:'Starting from July 1, 1988, Yu Chunshun began his "walk across all of China on foot." He overcame countless difficulties and dangers, sometimes walking 33 hours in a single day, from south to north and east to west, covering 420,000 kilometres in total. Remarkably, in a year and a half, he crossed step by step the Tibetan Plateau — known as the "world\'s third pole" — overcame severe altitude sickness, and completed this project.'
          },
          {
            zh:'一路上，他写了几百万字的日记，拍了很多照片，详细记录了各地的自然现象和民情习惯，留下了宝贵的材料。',
            py:'Yīlù shàng, tā xiě le jǐ bǎi wàn zì de rìjì, pāi le hěn duō zhàopiàn, xiángxì jìlù le gèdì de zìrán xiànxiàng hé mínqíng xíguàn, liú xià le bǎoguì de cáiliào.',

          {

            py:'Gè duìyuánmen zài kǎochá huódòng zhōng dōu bìxū zūnzhòng zìrán, jǐnliàng jiǎnshǎo rénlèi huódòng duì huánjìng de yǐngxiǎng. Yīncǐ, shǒuxiān, gè guó de kǎochá xiàngmù bùnéng hùxiāng yǐngxiǎng; qícì, dàjiā yào bǎochí liánghǎo de hézuò yìshí; dì-sān, bìxū wèi gè guó kēxuéjiā chuàngzào hézuò hé jiāoliú de tiáojiàn. Jīdì yǒu jǐ zhuàng lóufáng, dàjiā zhù zài yīqǐ, ānjìng ér héxié.',

/* ─────────────────── TONE COLORS ─────────────────── */
const TONE_CLR = ['#888','#e05555','#d4943a','#4aad7a','#4a9fe0'];
function toneOf(syl) {
  if (/[āēīōūǖ]/.test(syl)) return 1;
  if (/[áéíóúǘ]/.test(syl)) return 2;
  if (/[ǎěǐǒǔǚ]/.test(syl)) return 3;
  if (/[àèìòùǜ]/.test(syl)) return 4;
  return 0;
}
function colorPinyin(text) {
  return text.split(/\s+/).filter(Boolean).map(syl =>
    `<span style="color:${TONE_CLR[toneOf(syl)]}">${syl}</span>`
  ).join(' ');
}

/* ─────────────────── SRS ─────────────────── */
const DAY = 86400000;
function srsKey(wi) { return `srs_ch${currentChapter}_${wi}`; }
function getSRS(wi) {
  const s = localStorage.getItem(srsKey(wi));
  return s ? JSON.parse(s) : { interval:0, ease:2.5, due:0, reps:0, lapses:0 };
}
function setSRS(wi, good) {
  const s = getSRS(wi), now = Date.now();
  if (good) {
    s.interval = s.reps===0 ? 1 : s.reps===1 ? 6 : Math.round(s.interval * s.ease);
    s.ease = Math.max(1.3, s.ease + 0.1);
    s.reps++;
  } else {
    s.interval = 1; s.ease = Math.max(1.3, s.ease - 0.2);
    s.lapses++; s.reps = 0;
  }
  s.due = now + s.interval * DAY;
  localStorage.setItem(srsKey(wi), JSON.stringify(s));
}
function srsStatus(wi) {
  const s = getSRS(wi);
  if (s.reps === 0) return 'new';
  if (s.interval >= 21) return 'mastered';
  if (s.interval >= 7)  return 'review';
  return 'learning';
}

    const nextTs = all.map(i=>getSRS(i).due).filter(d=>d>now);
    const hrs = nextTs.length ? Math.ceil((Math.min(...nextTs)-now)/3600000) : 0;
    el.innerHTML = `<span class="srs-pill srs-done">✓ All reviewed${hrs ? ` · next in ${hrs}h` : ''}</span>`;
  } else {
    el.innerHTML =
      (due.length ? `<span class="srs-pill srs-due">📅 ${due.length} due</span>` : '') +
      (due.length && nw.length ? `<span class="srs-sep">·</span>` : '') +
      (nw.length  ? `<span class="srs-pill srs-new">✨ ${nw.length} new</span>` : '');
  }
}

/* ─────────────────── QUEUE ─────────────────── */
function shuffle(a) {
  a = [...a];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function buildQueue(indices) {
  if (indices !== undefined) {
    queue = shuffleMode ? shuffle([...indices]) : [...indices];
    updateSrsStats(); return;
  }
  const now = Date.now(), all = WORDS().map((_,i) => i);
  const due = all.filter(i => { const s=getSRS(i); return s.reps>0 && s.due<=now; });
  const nw  = all.filter(i => getSRS(i).reps===0);
  let src = [...due, ...nw];
  if (src.length === 0) src = [...all];
  queue = shuffleMode ? shuffle(src) : src;
  updateSrsStats();
}

/* ─────────────────── LOAD CARD ─────────────────── */
function loadCard() {

  revealed = false; activeTab = null; hwWriters = [];

  const pinyinEl = document.getElementById('pinyin');
  const hanziEl  = document.getElementById('hanzi');
  const revAns   = document.getElementById('reveal-answer');

      revAns.innerHTML = `<div class="rev-pinyin">${colorPinyin(w.pinyin)}</div><div class="rev-pos">${w.pos}</div><div class="rev-english">${w.english}</div>`;
      revAns.style.display = 'none';
    }
  } else {

  const _aa = document.getElementById('answer-area');

  document.getElementById('rating-row').classList.remove('visible');
  document.getElementById('tab-bar').classList.remove('visible');
  document.getElementById('tab-content').classList.remove('visible');
  document.getElementById('tab-content').innerHTML = '';

  const _cepL = document.getElementById('card-ex-preview');

/* ─────────────────── RATE ─────────────────── */
function rate(result) {
  const wi = queue[idx];
  setSRS(wi, result === 'good');
  if (result === 'again') { if (!againWords.includes(wi)) againWords.push(wi); }
  else goodCount++;
  idx++;
  updateSrsStats();
  loadCard();
}

/* ─────────────────── TABS ─────────────────── */
function switchTab(tab) {
  // toggle off
  if (activeTab === tab) {
    activeTab = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-content').classList.remove('visible');
    document.getElementById('tab-content').innerHTML = '';
    hwWriters = [];
    return;
  }
  activeTab = tab;
  hwWriters = [];
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  const content = document.getElementById('tab-content');
  content.innerHTML = '';
  content.classList.add('visible');

  if (tab === 'strokes')  buildStrokesTab(content);
  if (tab === 'examples') buildExamplesTab(content);
  if (tab === 'practice') buildPracticeTab(content);
}

/* — Strokes tab — */
function buildStrokesTab(content) {
  const w     = WORDS()[queue[idx]];
  const chars = [...w.hanzi];
  const inner = document.createElement('div');
  inner.className = 'stroke-inner';

  const row = document.createElement('div');
  row.className = 'stroke-chars';

  chars.forEach((char, i) => {
    const box    = document.createElement('div'); box.className = 'stroke-char-box';
    const target = document.createElement('div'); target.id = `hw-${i}`;
    const label  = document.createElement('div'); label.className = 'stroke-char-label'; label.textContent = char;
    box.appendChild(target); box.appendChild(label); row.appendChild(box);
  });

  const actions = document.createElement('div'); actions.className = 'stroke-actions';
  const replay  = document.createElement('button'); replay.className = 'stroke-act-btn'; replay.textContent = '▶ Replay';
  replay.onclick = () => hwWriters.forEach(hw => hw && hw.animateCharacter());

  let outlineOn = true;
  const outBtn = document.createElement('button'); outBtn.className = 'stroke-act-btn'; outBtn.textContent = '◻ Outline';
  outBtn.onclick = () => {
    outlineOn = !outlineOn;
    outBtn.textContent = outlineOn ? '◻ Outline' : '◼ Outline';
    hwWriters.forEach(hw => { if (!hw) return; outlineOn ? hw.showOutline() : hw.hideOutline(); });
  };

  actions.appendChild(replay); actions.appendChild(outBtn);
  inner.appendChild(row); inner.appendChild(actions);
  content.appendChild(inner);

  chars.forEach((char, i) => {
    try {
      const hw = HanziWriter.create(`hw-${i}`, char, {
        width:100, height:100, padding:8, showOutline:true,
        strokeColor:'#c9b8ff', outlineColor:'#3a3650', highlightColor:'#f0eeff',
        strokeAnimationSpeed:.8, delayBetweenStrokes:250, renderer:'svg',
      });
      hw.animateCharacter();
      hwWriters[i] = hw;
    } catch(e) {
      const el = document.getElementById(`hw-${i}`);
      if (el) el.innerHTML = `<div style="width:100px;height:100px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#5a5870;border-radius:8px;background:#1a1a24;">No data</div>`;
      hwWriters[i] = null;
    }
  });
}

async function detectServer() {
  const hint = document.getElementById('server-hint');
  if (!hint) return;
  if (!API_BASE) {
    hint.innerHTML = 'AI checking is only available on the local version.';
    const btn = document.getElementById('btn-check');
    if (btn) btn.disabled = true;
    return;
  }
  try {
    const r = await fetch(`${API_BASE}/check`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({sentence:'ping', word:'ping', pinyin:'', english:'', ping:true}),
      signal: AbortSignal.timeout(1500)
    });
    if (r.ok) { hint.textContent = 'AI ready ✓'; hint.style.color = '#80d080'; }
    else       { setServerHint(hint); }
  } catch {
    setServerHint(hint);
  }
}

function setServerHint(el) {
  el.innerHTML = 'Run <code style="background:#1e1c2e;padding:1px 4px;border-radius:4px;">python3 chinese_practice_server.py</code> to enable AI.';
}

async function checkSentence() {
  if (!API_BASE) return;
  const w        = WORDS()[queue[idx]];
  const sentence = (document.getElementById('my-sentence')?.value || '').trim();
  const respBox  = document.getElementById('ai-response');
  const btn      = document.getElementById('btn-check');
  if (!sentence || !respBox) return;

  respBox.className = 'ai-response visible';
  respBox.innerHTML = '<div class="ai-loading">Checking your sentence…</div>';
  btn.disabled = true;

  try {
    const r = await fetch(`${API_BASE}/check`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sentence, word: w.hanzi, pinyin: w.pinyin, english: w.english }),
      signal: AbortSignal.timeout(15000)
    });
    const data = await r.json();

    if (data.error === 'no_key') {
      respBox.innerHTML = `<div class="ai-error">⚠️ No API key set. Add ANTHROPIC_API_KEY to the server and restart.</div>`;
    } else if (data.error) {
      respBox.innerHTML = `<div class="ai-error">⚠️ ${data.message || 'Error contacting AI.'}</div>`;
    } else {
      renderAIResponse(respBox, data.result);
    }
  } catch(e) {
    respBox.innerHTML = `<div class="ai-error">⚠️ Cannot reach server. Make sure <code>chinese_practice_server.py</code> is running.</div>`;
  }
  btn.disabled = false;
}

function renderAIResponse(box, text) {
  // Parse the structured response: RATING / CORRECTED / FEEDBACK lines
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let ratingLine = '', correctedLine = '', feedbackLines = [];

  lines.forEach(l => {
    if      (l.startsWith('RATING:'))    ratingLine    = l.replace('RATING:', '').trim();
    else if (l.startsWith('CORRECTED:')) correctedLine = l.replace('CORRECTED:', '').trim();
    else if (l.startsWith('FEEDBACK:'))  feedbackLines.push(l.replace('FEEDBACK:', '').trim());
    else                                 feedbackLines.push(l);
  });

  const ratingClass = ratingLine.includes('✓') ? 'correct' : ratingLine.includes('≈') ? 'almost' : 'error';

  let html = '';
  if (ratingLine)   html += `<div class="ai-rating ${ratingClass}">${ratingLine}</div>`;
  if (correctedLine && correctedLine !== '—')
    html += `<div class="ai-corrected">${correctedLine}</div>`;
  if (feedbackLines.length)
    html += `<div class="ai-feedback">${feedbackLines.join(' ')}</div>`;

  // Fallback: render raw text if parsing failed
  if (!html) html = `<div class="ai-feedback">${text.replace(/\n/g,'<br>')}</div>`;

  box.innerHTML = html;
}

/* — Draw canvas — */
function drawInkColor() {
  if (drawColorIdx === 0) return drawTheme === 'dark' ? '#f0eeff' : '#1a0a2e';
  return DRAW_PALETTE[drawColorIdx];
}

function toggleDraw() {
  drawOpen = !drawOpen;
  const wrap = document.getElementById('draw-wrap');
  const btn  = document.getElementById('draw-toggle-btn');
  if (drawOpen) {
    wrap.style.display = '';
    btn.textContent = '✏️ Hide Canvas';
    btn.classList.add('open');
    drawLocked = false; // auto-enable drawing when canvas opens
    initDrawCanvas(); // sets touchAction:none, cursor:crosshair, syncs lock button
  } else {
    wrap.style.display = 'none';
    btn.textContent = '✏️ Draw';
    btn.classList.remove('open');
  }
}

function initDrawCanvas() {
  requestAnimationFrame(() => {
    const canvas = document.getElementById('draw-canvas');
    if (!canvas) return;
    drawStrokes = []; drawCurrent = null;

    // Sync toolbar button states (survives resetCardHTML)
    const gridBtn  = document.getElementById('draw-grid-btn');
    const themeBtn = document.getElementById('draw-theme-btn');
    const gridLabels = { none:'田 Grid', tian:'田 Tian', mi:'米 Mi' };
    if (gridBtn)  gridBtn.textContent  = gridLabels[drawGridMode];
    if (gridBtn)  gridBtn.classList.toggle('active', drawGridMode !== 'none');
    if (themeBtn) themeBtn.textContent = drawTheme === 'dark' ? '◑ Dark' : '◑ Light';
    if (themeBtn) themeBtn.classList.toggle('active', drawTheme === 'light');
    ['s','m','l'].forEach(k => {
      const b = document.getElementById(`dsz-${k}`);
      if (b) b.classList.toggle('active', (k==='s'&&drawStrokeSize===2)||(k==='m'&&drawStrokeSize===4)||(k==='l'&&drawStrokeSize===7));
    });
    const eraseBtn = document.getElementById('draw-erase-btn');
    if (eraseBtn) { eraseBtn.classList.toggle('active', drawEraseMode); eraseBtn.textContent = drawEraseMode ? '✏️ Draw' : '◯ Eraser'; }
    document.querySelectorAll('.draw-color-btn').forEach((b, i) => b.classList.toggle('active', i === drawColorIdx));
    const refBtn = document.getElementById('draw-ref-btn');
    if (refBtn) refBtn.classList.toggle('active', drawShowRef);

    if (drawEl !== canvas) {
      drawEl = canvas;
      const size = drawEl.offsetWidth;
      drawEl.width  = size;
      drawEl.height = size;
      drawCtx = drawEl.getContext('2d');

      drawEl.addEventListener('pointerdown', e => {
        if (drawLocked) return;
        e.preventDefault();
        const p = drawXY(e);
        drawCurrent = [p];
        if (drawEraseMode) {
          drawCtx.globalCompositeOperation = 'destination-out';
          drawCtx.strokeStyle = 'rgba(0,0,0,1)';
          drawCtx.lineWidth   = drawStrokeSize * 3;
        } else {
          drawCtx.globalCompositeOperation = 'source-over';
          drawCtx.strokeStyle = drawInkColor();
          drawCtx.lineWidth   = drawStrokeSize;
        }
        drawCtx.lineCap  = 'round';
        drawCtx.lineJoin = 'round';
        drawCtx.beginPath();
        drawCtx.moveTo(p.x, p.y);
      });

      drawEl.addEventListener('pointermove', e => {
        if (!drawCurrent || drawLocked) return;
        e.preventDefault();
        const p = drawXY(e);
        drawCurrent.push(p);
        const n = drawCurrent.length;
        if (n >= 3) {
          const p1 = drawCurrent[n-2], p2 = drawCurrent[n-1], p0 = drawCurrent[n-3];
          const mid1 = {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2};
          const mid2 = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
          drawCtx.beginPath();
          drawCtx.moveTo(mid1.x, mid1.y);
          drawCtx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
          drawCtx.stroke();
        } else {
          drawCtx.lineTo(p.x, p.y);
          drawCtx.stroke();
          drawCtx.beginPath();
          drawCtx.moveTo(p.x, p.y);
        }
      });

      const end = () => {
        if (drawCurrent && drawCurrent.length > 1)
          drawStrokes.push({ pts: drawCurrent, erase: drawEraseMode, color: drawInkColor(), size: drawEraseMode ? drawStrokeSize * 3 : drawStrokeSize });
        drawCtx.globalCompositeOperation = 'source-over';
        drawCurrent = null;
      };
      drawEl.addEventListener('pointerup',     end);
      drawEl.addEventListener('pointercancel', end);
    }

    drawEl.style.background = drawTheme === 'dark' ? '#07070d' : '#f8f6ff';
    drawEl.style.touchAction = drawLocked ? 'auto' : 'none';
    drawEl.style.cursor = drawLocked ? 'default' : 'crosshair';
    const lockBtn = document.getElementById('draw-lock-btn');
    if (lockBtn) { lockBtn.textContent = drawLocked ? '✏️ Draw' : '🔒 Lock'; lockBtn.classList.toggle('active', !drawLocked); }
    drawPaint();
  });
}

function toggleDrawLock() {
  drawLocked = !drawLocked;
  if (drawEl) {
    drawEl.style.touchAction = drawLocked ? 'auto' : 'none';
    drawEl.style.cursor = drawLocked ? 'default' : 'crosshair';
  }
  const btn = document.getElementById('draw-lock-btn');
  if (btn) { btn.textContent = drawLocked ? '✏️ Draw' : '🔒 Lock'; btn.classList.toggle('active', !drawLocked); }
  if (drawLocked) { drawCurrent = null; }
}

function drawXY(e) {
  const r  = drawEl.getBoundingClientRect();
  const sx = drawEl.width  / r.width;
  const sy = drawEl.height / r.height;
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

function paintGrid(s) {
  if (drawGridMode === 'none') return;
  const gc = drawTheme === 'dark' ? 'rgba(90,70,140,0.55)' : 'rgba(150,120,200,0.45)';
  drawCtx.save();
  drawCtx.strokeStyle = gc; drawCtx.lineWidth = 1;
  drawCtx.setLineDash([5, 4]);
  drawCtx.strokeRect(3, 3, s-6, s-6);
  drawCtx.beginPath();
  drawCtx.moveTo(s/2, 3);   drawCtx.lineTo(s/2, s-3);
  drawCtx.moveTo(3, s/2);   drawCtx.lineTo(s-3, s/2);
  if (drawGridMode === 'mi') {
    drawCtx.moveTo(3, 3);     drawCtx.lineTo(s-3, s-3);
    drawCtx.moveTo(s-3, 3);   drawCtx.lineTo(3, s-3);
  }
  drawCtx.stroke();
  drawCtx.restore();
}

function drawPaint() {
  if (!drawCtx || !drawEl) return;
  const s = drawEl.width;
  drawCtx.clearRect(0, 0, s, s);
  paintGrid(s);
  paintRef(s);
  drawStrokes.forEach(stroke => {
    const pts = Array.isArray(stroke) ? stroke : stroke.pts;
    if (!pts || pts.length < 2) return;
    drawCtx.save();
    if (!Array.isArray(stroke) && stroke.erase) {
      drawCtx.globalCompositeOperation = 'destination-out';
      drawCtx.strokeStyle = 'rgba(0,0,0,1)';
      drawCtx.lineWidth   = stroke.size || drawStrokeSize * 3;
    } else {
      drawCtx.globalCompositeOperation = 'source-over';
      drawCtx.strokeStyle = stroke.color || drawInkColor();
      drawCtx.lineWidth   = stroke.size || drawStrokeSize;
    }
    drawCtx.lineCap  = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.beginPath();
    drawCtx.moveTo(pts[0].x, pts[0].y);
    if (pts.length === 2) {
      drawCtx.lineTo(pts[1].x, pts[1].y);
    } else {
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i].x + pts[i+1].x) / 2;
        const my = (pts[i].y + pts[i+1].y) / 2;
        drawCtx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      drawCtx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    }
    drawCtx.stroke();
    drawCtx.restore();
  });
}

function paintRef(s) {
  if (!drawShowRef || queue[idx] === undefined) return;
  const word = WORDS()[queue[idx]];
  if (!word || !word.hanzi) return;
  drawCtx.save();
  drawCtx.font = `bold ${Math.round(s * 0.55)}px serif`;
  drawCtx.textAlign = 'center';
  drawCtx.textBaseline = 'middle';
  drawCtx.fillStyle = drawTheme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.09)';
  drawCtx.fillText(word.hanzi, s / 2, s / 2, s * 0.88);
  drawCtx.restore();
}

/* ── TTS: pick the best available Mandarin voice ── */
let _zhVoice = null;
let _voicesLoaded = false;

function pickBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  /* Priority list — neural / natural voices first */
  const priority = [
    'Microsoft Xiaoxiao Online (Natural)',   // Edge — best quality
    'Microsoft Yunxi Online (Natural)',
    'Microsoft Xiaoyi Online (Natural)',
    'Microsoft Xiaoxiao',
    'Microsoft Yunxi',
    'Microsoft Xiaoyi',
    'Tingting',           // macOS Enhanced
    'Mei-Jia',            // macOS Taiwan
    'Google 普通话（中国大陆）',
    'Google Chinese (Simplified)',
  ];
  for (const name of priority) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  /* Fallback: any zh-CN, then any zh */
  return voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang.startsWith('zh-CN'))
      || voices.find(v => v.lang.startsWith('zh'))
      || null;
}

function getZhVoice() {
  if (_zhVoice) return _zhVoice;
  _zhVoice = pickBestVoice();
  return _zhVoice;
}

/* Re-pick when browser finishes loading voices (Chrome async) */
if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    _zhVoice = null;
    _zhVoice = pickBestVoice();
  });
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt   = new SpeechSynthesisUtterance(text);
  utt.lang    = 'zh-CN';
  const voice = getZhVoice();
  if (voice) utt.voice = voice;
  /* Natural-sounding settings */
  const isNeural = voice && (voice.name.includes('Natural') || voice.name.includes('Online'));
  utt.rate  = isNeural ? 1.0 : 0.82;   // neural voices need normal speed; robot voices need slower
  utt.pitch = 1.0;
  window.speechSynthesis.speak(utt);
}

function buildWlGrid() {
  const grid = document.getElementById('wl-grid');

  if (wlShowAll) {

      (againWords.includes(i) ? ' again-marked' : '');

function normPinyin(s) {
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/v/g, 'u').replace(/\s+/g, '');
}

    result.className = 'type-result visible ' + (correct ? 'correct' : 'wrong');

function openStats()  { buildStats(); document.getElementById('stats-modal').classList.add('open'); }

function buildStats() {
  const chWords = [WORDS_CH1, WORDS_CH2, WORDS_CH3, WORDS_CH4, WORDS_CH5, WORDS_CH6, WORDS_CH7, WORDS_CH8, WORDS_CH9, WORDS_CH10, WORDS_CH11, WORDS_CH12, WORDS_CH13, WORDS_CH14];
  const chNames = ['上海的地铁', '为什么不快乐', '塞翁失马', '狼和鹿', '丽江的画', '终于结婚了'];
  let tot = { new:0, learning:0, review:0, mastered:0 };

  const chData = chWords.map((words, ci) => {
    const ch = ci + 1;
    const st = { new:0, learning:0, review:0, mastered:0, total:words.length };
    words.forEach((_, i) => {
      const s = localStorage.getItem(`srs_ch${ch}_${i}`);
      const d = s ? JSON.parse(s) : null;
      if (!d || d.reps===0)   st.new++;
      else if (d.interval>=21) st.mastered++;
      else if (d.interval>=7)  st.review++;
      else                     st.learning++;
    });
    tot.new += st.new; tot.learning += st.learning;
    tot.review += st.review; tot.mastered += st.mastered;
    return { ch, name:chNames[ci], ...st };
  });

  const totalWords = tot.new + tot.learning + tot.review + tot.mastered;

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-total"><strong>${tot.mastered + tot.review + tot.learning}</strong> / ${totalWords} words studied</div>
    <div class="stats-num-row">
      <div class="stats-num-box sn-mastered"><div class="sn-num">${tot.mastered}</div><div class="sn-lbl">Mastered</div></div>
      <div class="stats-num-box sn-review"><div class="sn-num">${tot.review}</div><div class="sn-lbl">Review</div></div>
      <div class="stats-num-box sn-learning"><div class="sn-num">${tot.learning}</div><div class="sn-lbl">Learning</div></div>
      <div class="stats-num-box sn-new"><div class="sn-num">${tot.new}</div><div class="sn-lbl">New</div></div>
    </div>
    <div class="stats-ch-list">
      ${chData.map(d => {
        const mPct = (d.mastered / d.total * 100).toFixed(1);
        const rPct = (d.review   / d.total * 100).toFixed(1);
        const lPct = (d.learning / d.total * 100).toFixed(1);
        return `<div class="stats-ch-item">
          <div class="stats-ch-label">
            <span>Ch ${d.ch} · ${d.name}</span>
            <span class="stats-ch-pct">${d.mastered + d.review + d.learning}/${d.total} studied</span>
          </div>
          <div class="stats-ch-bar">
            <div class="stats-bar-seg-m" style="width:${mPct}%"></div>
            <div class="stats-bar-seg-r" style="width:${rPct}%"></div>
            <div class="stats-bar-seg-l" style="width:${lPct}%"></div>
          </div>
        </div>`;

function annotateVocab(text) {
  const words = WORDS();
  const sorted = [...words].sort((a, b) => b.hanzi.length - a.hanzi.length);
  const marks = {};
  sorted.forEach((w, i) => {
    if (text.includes(w.hanzi)) {
      text = text.split(w.hanzi).join('\x00' + i + '\x00');
      marks[i] = w;
    }
  });
  Object.keys(marks).forEach(i => {
    const w = marks[i];
    const py = w.pinyin.replace(/'/g, '&apos;');
    const en = w.english.replace(/'/g, '&apos;').replace(/"/g, '&quot;');
    const pos = w.pos.replace(/'/g, '&apos;');
    text = text.split('\x00' + i + '\x00').join(
      `<span class="vocab-hl" onclick="showVocabPop(event,'${w.hanzi}','${py}','${pos}','${en}')">${w.hanzi}</span>`
    );
  });
  return text;
}

function showVocabPop(e, hanzi, py, pos, en) {
  e.stopPropagation();
  const pop = document.getElementById('vocab-popup');
  document.getElementById('vp-hanzi').textContent  = hanzi;
  document.getElementById('vp-pinyin').innerHTML   = colorPinyin(py);
  document.getElementById('vp-pos').textContent    = pos;
  document.getElementById('vp-en').textContent     = en;
  const rect = e.target.getBoundingClientRect();
  const pw = 200, ph = 110;
  let left = rect.left + window.scrollX;
  let top  = rect.bottom + window.scrollY + 6;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if (top + ph > window.scrollY + window.innerHeight - 8) top = rect.top + window.scrollY - ph - 6;
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
  pop.classList.add('show');
}

function closeVocabPop() {
  document.getElementById('vocab-popup').classList.remove('show');
}

document.addEventListener('click', e => {
  const pop = document.getElementById('vocab-popup');
  if (pop.classList.contains('show') && !pop.contains(e.target) && !e.target.classList.contains('vocab-hl')) {

/* ─────────────────── STREAK ─────────────────── */
function todayStr() { return new Date().toISOString().slice(0,10); }
function loadStreak() {
  const last  = localStorage.getItem('streak_last')  || '';
  const count = parseInt(localStorage.getItem('streak_count') || '0', 10);
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (last === today) return count;
  if (last === yesterday) return count; // still alive, will increment on next study
  if (last === '') return 0;
  return 0; // broken
}
function bumpStreak() {
  const today = todayStr();
  const last  = localStorage.getItem('streak_last') || '';
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  const cur = parseInt(localStorage.getItem('streak_count') || '0', 10);
  const next = (last === yesterday || last === '') ? cur + 1 : 1;
  localStorage.setItem('streak_count', next);
  localStorage.setItem('streak_last', today);
  renderStreak();
}
function renderStreak() {
  const el = document.getElementById('streak-badge');
  if (!el) return;
  const count = loadStreak();
  if (count === 0) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.classList.toggle('dead', count === 0);
  el.innerHTML = `🔥 ${count} day${count !== 1 ? 's' : ''}`;
}

/* ─────────────────── SRS EXPORT / IMPORT ─────────────────── */
function exportSRS() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('srs_')) data[k] = localStorage.getItem(k);
  }
  data['streak_count'] = localStorage.getItem('streak_count') || '0';
  data['streak_last']  = localStorage.getItem('streak_last')  || '';
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chinese-srs-backup-${todayStr()}.json`;
  a.click();
}
function importSRS(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      Object.entries(data).forEach(([k, v]) => {
        if (k.startsWith('srs_') || k === 'streak_count' || k === 'streak_last') {
          localStorage.setItem(k, v); count++;
        }
      });
      updateSrsStats(); renderStreak(); buildStats();
      alert(`Imported ${count} entries successfully!`);
    } catch { alert('Invalid backup file.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ─────────────────── CONFETTI ─────────────────── */
function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#c9b8ff','#7c5cbf','#4aad7a','#f0c060','#f08080','#74d7f7'];
  const pieces = Array.from({length:80}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 5,
    c: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4,
    vy: 3 + Math.random() * 4,
    rot: Math.random() * 360,
    vrot: (Math.random() - 0.5) * 8,
    alpha: 1,
  }));
  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
      if (p.alpha > 0) { alive = true; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      ctx.restore();
    });
    if (alive) { frame = requestAnimationFrame(draw); }
    else { canvas.style.display = 'none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  cancelAnimationFrame(frame);
  draw();
}

/* ─────────────────── LESSON TTS ─────────────────── */
let _lessonSpeaking = false;

function speakParagraph(e, ti, pi) {
  e.stopPropagation();
  const ch = currentChapter;
  const lesson = LESSONS[ch];
  if (!lesson) return;
  const text = lesson.texts[ti]?.paragraphs[pi]?.zh;
  if (!text) return;

  const btn = document.getElementById(`para-speak-${ti}-${pi}`);
  const allBtns = document.querySelectorAll('.text-para-speak, .text-read-all-btn');

  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    allBtns.forEach(b => b.classList.remove('playing'));
    _lessonSpeaking = false;
    return;
  }

  allBtns.forEach(b => b.classList.remove('playing'));
  btn.classList.add('playing');
  _lessonSpeaking = true;

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN';
  const voice = getZhVoice();
  if (voice) utt.voice = voice;
  const isNeural = voice && (voice.name.includes('Natural') || voice.name.includes('Online'));
  utt.rate  = isNeural ? 0.95 : 0.8;
  utt.pitch = 1.0;
  utt.onend = () => { btn.classList.remove('playing'); _lessonSpeaking = false; };
  utt.onerror = () => { btn.classList.remove('playing'); _lessonSpeaking = false; };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function readAllParagraphs(ti) {
  const ch = currentChapter;
  const lesson = LESSONS[ch];
  if (!lesson) return;
  const paragraphs = lesson.texts[ti]?.paragraphs;
  if (!paragraphs?.length) return;

  const btn = document.getElementById(`read-all-${ti}`);
  const allBtns = document.querySelectorAll('.text-para-speak, .text-read-all-btn');

  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    allBtns.forEach(b => b.classList.remove('playing'));
    if (btn) btn.textContent = '▶ Listen';
    _lessonSpeaking = false;
    return;
  }

  allBtns.forEach(b => b.classList.remove('playing'));
  if (btn) { btn.classList.add('playing'); btn.textContent = '■ Stop'; }
  _lessonSpeaking = true;

  const voice = getZhVoice();
  const isNeural = voice && (voice.name.includes('Natural') || voice.name.includes('Online'));

  window.speechSynthesis.cancel();

  paragraphs.forEach((p, pi) => {
    const utt = new SpeechSynthesisUtterance(p.zh);
    utt.lang  = 'zh-CN';
    if (voice) utt.voice = voice;
    utt.rate  = isNeural ? 0.95 : 0.8;
    utt.pitch = 1.0;

    utt.onstart = () => {
      document.querySelectorAll('.text-para-speak').forEach(b => b.classList.remove('playing'));
      const pb = document.getElementById(`para-speak-${ti}-${pi}`);
      if (pb) pb.classList.add('playing');
    };

    if (pi === paragraphs.length - 1) {
      utt.onend = () => {
        allBtns.forEach(b => b.classList.remove('playing'));
        if (btn) btn.textContent = '▶ Listen';
        _lessonSpeaking = false;
      };
      utt.onerror = () => {
        allBtns.forEach(b => b.classList.remove('playing'));
        if (btn) btn.textContent = '▶ Listen';
        _lessonSpeaking = false;
      };
    }
    window.speechSynthesis.speak(utt);
  });
}

/* Init streak on load */
renderStreak();
</script>
