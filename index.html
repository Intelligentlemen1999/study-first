<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chinese Practice">
<meta name="theme-color" content="#0f0f14">
<title>Chinese Practice — HSK Reading</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f0f14;
  color: #e8e6f0;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: max(env(safe-area-inset-top), 20px) 16px max(env(safe-area-inset-bottom), 20px);
  -webkit-overflow-scrolling: touch;
}

h1 {
  font-size: 13px;
  font-weight: 500;
  color: #7c7a8e;
  margin-bottom: 16px;
  margin-top: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── CHAPTER SWITCHER ── */
.chapter-switcher {
  display:flex; gap:6px; margin-bottom:10px;
  width:100%; max-width:500px;
}
.ch-btn {
  flex:1; padding:7px 6px;
  background:#141420; border:1px solid #2e2c3e;
  border-radius:10px; color:#5a5870;
  font-size:11px; font-weight:500; cursor:pointer;
  transition:all .15s; line-height:1.35; text-align:center;
  touch-action:manipulation; min-height:40px; white-space:nowrap;
}
.ch-btn:hover  { border-color:#4e4c5e; color:#9a88cc; background:#1a1828; }
.ch-btn.active { border-color:#7c5cbf; color:#c9b8ff; background:#1e1a2e; }
.ch-btn .ch-num  { font-size:9px; color:inherit; opacity:.7; display:block; }
.ch-btn .ch-name { font-size:11px; }

/* ── SRS STATS BAR ── */
.srs-stats {
  display:flex; gap:6px; justify-content:center; align-items:center;
  margin-bottom:12px; min-height:26px; flex-wrap:wrap;
}
.srs-pill {
  padding:3px 11px; border-radius:20px;
  font-size:12px; font-weight:600; letter-spacing:.02em;
}
.srs-due  { background:#3a1515; color:#e05555; }
.srs-new  { background:#152030; color:#4a9fe0; }
.srs-done { background:#152515; color:#4aad7a; }
.srs-sep  { color:#2e2c3e; font-size:14px; }

/* ── SRS BADGES on word list ── */
.srs-badge {
  display:inline-block; font-size:9px; padding:1px 5px; border-radius:4px;
  font-weight:600; letter-spacing:.04em; margin-top:3px; text-transform:uppercase;
}
.srs-badge.new      { background:#1a2a3a; color:#4a9fe0; }
.srs-badge.learning { background:#2a1f10; color:#d4943a; }
.srs-badge.review   { background:#1a2a1a; color:#4aad7a; }
.srs-badge.mastered { background:#221a33; color:#c9b8ff; }

/* ── CARD ── */
.card {
  background: #1a1a24;
  border: 1px solid #2e2c3e;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  padding: 24px 20px 22px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.progress {
  font-size: 12px; color: #4e4c5e;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.progress-bar { flex:1; height:3px; background:#2e2c3e; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#7c5cbf; border-radius:2px; transition:width 0.4s; }

.pinyin  { font-size:36px; font-weight:300; color:#c9b8ff; letter-spacing:.04em; margin-bottom:4px; min-height:46px; }
.pos     { font-size:13px; color:#5a5870; margin-bottom:10px; min-height:18px; }
.english { font-size:15px; color:#8a889e; margin-bottom:16px; min-height:20px; }

.answer-area {
  background:#0f0f14; border:2px dashed #2e2c3e; border-radius:14px;
  padding:20px 16px; margin-bottom:14px; min-height:84px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:border-color .2s;
  touch-action: manipulation;
}
.answer-area:hover { border-color:#4e4c5e; }
.answer-area.revealed { border:2px solid #3d3a52; cursor:default; background:#141420; }
.answer-hint { font-size:13px; color:#3a384a; }
.hanzi { font-size:54px; color:#f0eeff; letter-spacing:.1em; line-height:1.1; }

/* ── BUTTONS ── */
.btn-row { display:flex; gap:10px; }
button {
  flex:1; padding:14px 12px; border-radius:12px; border:none;
  font-size:15px; font-weight:500; cursor:pointer;
  transition:opacity .15s, transform .1s;
  touch-action: manipulation;
  min-height: 48px;
}
button:active { transform:scale(.97); }
button:disabled { opacity:.3; cursor:default; transform:none; }

#btn-reveal { background:#7c5cbf; color:#fff; }
#btn-reveal:hover:not(:disabled) { background:#8d6dd0; }

.rating-row { display:none; gap:10px; margin-top:10px; }
.rating-row.visible { display:flex; }
#btn-again { background:#3a1a1a; color:#f08080; border:1px solid #5a2a2a; }
#btn-again:hover:not(:disabled) { background:#4a2020; }
#btn-good  { background:#1a3a22; color:#80d080; border:1px solid #2a5a32; }
#btn-good:hover:not(:disabled)  { background:#203a28; }

/* ── TAB BAR ── */
.tab-bar {
  display:none; gap:6px; margin-top:12px;
}
.tab-bar.visible { display:flex; }

.tab-btn {
  flex:1; padding:12px 6px; border-radius:10px;
  background:#141420; border:1px solid #2e2c3e;
  color:#5a5870; font-size:12px; font-weight:500; cursor:pointer;
  transition:all .15s; touch-action:manipulation; min-height:46px;
}
.tab-btn:hover  { border-color:#4e4c5e; color:#9a88cc; background:#1a1828; }
.tab-btn.active { border-color:#7c5cbf; color:#c9b8ff; background:#1e1a2e; }

/* ── TAB CONTENT ── */
.tab-content {
  display:none; margin-top:10px;
  background:#0f0f14; border:1px solid #2e2c3e;
  border-radius:14px; overflow:hidden;
}
.tab-content.visible { display:block; }

/* — Strokes tab — */
.stroke-inner { padding:16px; }
.stroke-chars { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
.stroke-char-box { display:flex; flex-direction:column; align-items:center; gap:5px; }
.stroke-char-box svg { border-radius:8px; background:#1a1a24; }
.stroke-char-label { font-size:10px; color:#5a5870; }
.stroke-actions { display:flex; gap:8px; margin-top:12px; justify-content:center; }
.stroke-act-btn {
  padding:6px 14px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:12px; cursor:pointer; flex:none;
}
.stroke-act-btn:hover { background:#2a2540; }

/* — Examples tab — */
.examples-inner { padding:14px 16px; }
.example-item {
  padding:10px 0;
  border-bottom:1px solid #1e1c2e;
  text-align:left;
}
.example-item:last-child { border-bottom:none; }
.ex-zh { font-size:17px; color:#f0eeff; margin-bottom:3px; line-height:1.4; }
.ex-py { font-size:12px; color:#7a6aaa; font-style:italic; margin-bottom:3px; }
.ex-en { font-size:12px; color:#5a5870; }

/* — Practice tab — */
.practice-inner { padding:16px; text-align:left; }
.practice-prompt {
  font-size:13px; color:#7a6aaa; margin-bottom:10px;
}
.practice-prompt strong { color:#c9b8ff; }

textarea#my-sentence {
  width:100%; min-height:72px;
  background:#141420; border:1px solid #3a3650;
  border-radius:10px; padding:12px;
  color:#e8e6f0; font-size:16px; font-family:inherit;
  resize:vertical; outline:none; transition:border-color .2s;
}
textarea#my-sentence:focus { border-color:#7c5cbf; }
textarea#my-sentence::placeholder { color:#3a384a; }

.check-row { display:flex; gap:8px; margin-top:10px; align-items:center; }
#btn-check {
  background:#7c5cbf; color:#fff; border:none;
  border-radius:10px; padding:10px 18px;
  font-size:13px; font-weight:600; cursor:pointer; flex:none;
  transition:background .15s;
}
#btn-check:hover { background:#8d6dd0; }
#btn-check:disabled { opacity:.4; cursor:default; }

.server-hint {
  font-size:11px; color:#4a4860; flex:1;
  line-height:1.4;
}
.server-hint a { color:#7c5cbf; text-decoration:none; }

/* AI response box */
.ai-response {
  display:none;
  margin-top:12px;
  background:#141420;
  border-radius:10px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.6;
  border-left:3px solid #7c5cbf;
}
.ai-response.visible { display:block; }
.ai-rating {
  font-size:15px; font-weight:600; margin-bottom:6px;
}
.ai-rating.correct   { color:#80d080; }
.ai-rating.error     { color:#f08080; }
.ai-rating.almost    { color:#f0c070; }
.ai-corrected {
  font-size:15px; color:#f0eeff; margin-bottom:6px;
  background:#1e1c2e; border-radius:8px; padding:8px 10px;
}
.ai-feedback { font-size:12px; color:#7a6aaa; }
.ai-loading  { color:#5a5870; font-style:italic; }
.ai-error    { color:#f08080; font-size:12px; }

/* — Draw canvas — */
.draw-toggle-btn {
  width:100%; padding:10px; margin-bottom:12px;
  background:#141420; border:1px dashed #2e2c3e;
  border-radius:10px; color:#5a5870; font-size:14px;
  cursor:pointer; touch-action:manipulation; min-height:44px;
  transition:all .15s; letter-spacing:.02em;
}
.draw-toggle-btn:hover, .draw-toggle-btn.open {
  border-color:#7c5cbf; color:#c9b8ff; background:#1a1828; border-style:solid;
}
.draw-wrap {
  margin:0 0 12px; padding:12px 12px 10px;
  background:rgba(10,8,22,0.65); border-radius:14px;
  border:1.5px solid rgba(124,92,191,0.28);
}
#draw-canvas {
  display:block; width:100%;
  background:#07070d; border-radius:10px;
  cursor:default; touch-action:auto; user-select:none;
  transition:background .2s, box-shadow .2s;
  box-shadow:0 0 0 1.5px rgba(124,92,191,0.22), 0 4px 20px rgba(0,0,0,0.45);
}
.draw-colors {
  display:flex; gap:9px; margin-top:10px;
  justify-content:center; align-items:center; flex-wrap:wrap;
}
.draw-action-btn {
  padding:6px 13px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:13px; cursor:pointer;
  touch-action:manipulation; min-height:34px; white-space:nowrap;
  transition:all .15s; margin-left:4px;
}
.draw-action-btn:hover { background:#2a2540; color:#c9b8ff; border-color:#7c5cbf; }
.draw-color-btn {
  width:26px; height:26px; border-radius:50%;
  border:2.5px solid transparent; cursor:pointer;
  transition:transform .15s, border-color .15s, box-shadow .15s;
  padding:0; touch-action:manipulation; outline:none; flex:none;
}
.draw-color-btn.active {
  border-color:#c9b8ff; transform:scale(1.22);
  box-shadow:0 0 8px rgba(124,92,191,0.55);
}
.draw-toolbar {
  display:flex; gap:6px; margin-top:8px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  padding-bottom:2px; scrollbar-width:none;
}
.draw-toolbar::-webkit-scrollbar { display:none; }
.draw-act-btn {
  padding:8px 12px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:13px; cursor:pointer;
  touch-action:manipulation; min-height:38px; white-space:nowrap;
  flex:none; transition:all .15s;
}
.draw-act-btn:hover, .draw-act-btn.active {
  background:#2a2540; color:#c9b8ff; border-color:#7c5cbf;
}
.draw-size-dot { font-size:9px; margin-right:2px; }

/* ── KEY HINT ── */
.key-hint { font-size:11px; color:#3a384a; margin-top:10px; }
@media (pointer: coarse) { .key-hint { display:none; } }

/* ── CONTROLS ── */
.controls {
  display:flex; flex-direction:row; gap:7px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  margin-top:10px; width:100%; max-width:500px;
  padding-bottom:3px; scrollbar-width:none;
}
.controls::-webkit-scrollbar { display:none; }
.ctrl-btn {
  padding:10px 14px; background:transparent;
  border:1px solid #2e2c3e; border-radius:10px;
  color:#5a5870; font-size:13px; cursor:pointer;
  transition:all .15s; flex:none;
  touch-action:manipulation; min-height:44px; white-space:nowrap;
}
.ctrl-btn:hover  { border-color:#4e4c5e; color:#8a88a0; background:#1a1a24; }
.ctrl-btn.active { border-color:#7c5cbf; color:#c9b8ff; background:#1e1a2e; }

/* ── WORD LIST MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.8); z-index:100;
  overflow-y:auto; padding:0;
}
.modal-overlay.open { display:flex; align-items:flex-end; justify-content:center; }

.modal-box {
  background:#1a1a24; border:1px solid #2e2c3e;
  border-radius:20px 20px 0 0; width:100%; max-width:540px;
  padding-bottom:max(env(safe-area-inset-bottom), 8px);
  max-height:92dvh; overflow:hidden; display:flex; flex-direction:column;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 16px 14px; border-bottom:1px solid #2e2c3e;
  flex-shrink:0;
}
.modal-header h2 { font-size:16px; color:#c9b8ff; font-weight:600; }
.modal-close {
  background:none; border:none; color:#5a5870;
  font-size:19px; cursor:pointer; flex:none;
  padding:3px 7px; border-radius:7px;
}
.modal-close:hover { color:#e8e6f0; background:#2e2c3e; }

.modal-toolbar {
  display:flex; gap:8px; padding:10px 16px;
  border-bottom:1px solid #2e2c3e; flex-wrap:wrap; flex-shrink:0;
}
.tb-btn {
  padding:10px 14px; background:#2e2c3e; border:none;
  border-radius:7px; color:#9a88cc; font-size:13px; cursor:pointer; flex:none;
  touch-action:manipulation; min-height:40px;
}
.tb-btn:hover { background:#3a3850; }
.tb-btn.danger { color:#f08080; background:#3a1a1a; }
.tb-btn.danger:hover { background:#4a2020; }

.wl-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr));
  gap:7px; padding:12px 16px; max-height:48dvh; overflow-y:auto;
  transition:max-height .3s; -webkit-overflow-scrolling:touch;
}

.wl-card {
  background:#141420; border:2px solid #2e2c3e;
  border-radius:12px; padding:11px 9px 30px;
  cursor:pointer; transition:all .15s;
  text-align:center; user-select:none; position:relative;
}
.wl-card:hover { border-color:#4e4c5e; background:#1a1828; }
.wl-card.selected { border-color:#7c5cbf; background:#1e1a2e; }
.wl-card.stroke-active { border-color:#9a88cc !important; }
.wl-card.again-marked { border-color:#5a2a2a; }
.wl-card.again-marked.selected { border-color:#7c5cbf; }

.wl-hanzi  { font-size:24px; color:#f0eeff; margin-bottom:3px; }
.wl-pinyin { font-size:10px; color:#9a88cc; margin-bottom:2px; }
.wl-english{ font-size:9px; color:#4e4c5e; line-height:1.3; }
.wl-tag    { display:inline-block; font-size:8px; padding:1px 5px; border-radius:4px; margin-top:3px; background:#3a1a1a; color:#f08080; }

.wl-stroke-btn {
  position:absolute; bottom:5px; left:50%; transform:translateX(-50%);
  padding:2px 9px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:6px; color:#6a5a9a; font-size:9px; cursor:pointer;
  white-space:nowrap; flex:none; transition:all .15s;
}
.wl-stroke-btn:hover,.wl-stroke-btn.active { background:#2a2540; color:#c9b8ff; border-color:#7c5cbf; }

/* word list stroke preview */
.wl-stroke-preview { display:none; border-top:1px solid #2e2c3e; background:#0f0f14; padding:14px 16px 12px; flex-shrink:0; }
.wl-stroke-preview.visible { display:block; }
.wsp-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.wsp-hanzi  { font-size:22px; color:#f0eeff; }
.wsp-pinyin { font-size:12px; color:#9a88cc; }
.wsp-english{ font-size:11px; color:#5a5870; flex:1; }
.wsp-close  { background:none; border:none; color:#5a5870; font-size:15px; cursor:pointer; flex:none; padding:2px 6px; border-radius:5px; }
.wsp-close:hover { color:#e8e6f0; background:#2e2c3e; }
.wsp-chars  { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
.wsp-char-box { display:flex; flex-direction:column; align-items:center; gap:4px; }
.wsp-char-box svg { border-radius:7px; background:#1a1a24; }
.wsp-char-label { font-size:9px; color:#5a5870; }
.wsp-actions { display:flex; gap:7px; margin-top:10px; justify-content:center; }

.modal-footer {
  padding:14px 16px; border-top:1px solid #2e2c3e;
  display:flex; gap:10px; align-items:center; flex-shrink:0;
}
.sel-count { font-size:12px; color:#5a5870; flex:1; }
#wl-practice-btn {
  background:#7c5cbf; color:#fff; border:none; border-radius:11px;
  padding:14px 22px; font-size:14px; font-weight:600; cursor:pointer; flex:none;
  touch-action:manipulation; min-height:48px;
}
#wl-practice-btn:hover { background:#8d6dd0; }
#wl-practice-btn:disabled { opacity:.3; cursor:default; }

/* ── DONE SCREEN ── */
.done-screen { text-align:center; }
.done-screen .big { font-size:44px; margin-bottom:10px; }
.done-screen h2  { font-size:20px; color:#c9b8ff; margin-bottom:5px; }
.summary { display:flex; gap:12px; justify-content:center; margin:16px 0 18px; }
.stat-box { flex:1; padding:12px 8px; border-radius:11px; font-size:12px; }
.stat-box .num { font-size:28px; font-weight:600; margin-bottom:3px; }
.stat-box.good  { background:#1a3a22; color:#80d080; }
.stat-box.again { background:#3a1a1a; color:#f08080; }
.again-list {
  text-align:left; background:#141420; border:1px solid #2e2c3e;
  border-radius:11px; padding:10px 13px; margin-bottom:14px;
  max-height:150px; overflow-y:auto;
}
.again-list h3 { font-size:10px; color:#5a5870; margin-bottom:7px; letter-spacing:.05em; text-transform:uppercase; }
.again-item { display:flex; align-items:baseline; gap:7px; padding:3px 0; border-bottom:1px solid #1e1c2e; }
.again-item:last-child { border-bottom:none; }
.again-item .ah { font-size:18px; color:#f0eeff; min-width:40px; }
.again-item .ap { font-size:12px; color:#9a88cc; }
.again-item .ae { font-size:10px; color:#5a5870; }
.done-btns { display:flex; gap:10px; }
.done-btn { flex:1; padding:14px; border-radius:11px; border:none; font-size:14px; font-weight:500; cursor:pointer; touch-action:manipulation; min-height:50px; }
.done-btn.primary   { background:#7c5cbf; color:#fff; }
.done-btn.primary:hover   { background:#8d6dd0; }
.done-btn.secondary { background:#2e2c3e; color:#c9b8ff; }
.done-btn.secondary:hover { background:#3a3850; }

/* ── IOS INSTALL HINT ── */
.ios-hint {
  position:fixed; left:16px; right:16px;
  bottom:max(calc(env(safe-area-inset-bottom) + 14px), 22px);
  background:linear-gradient(135deg,#241c3a,#1a1630);
  border:1px solid #4e3a7a; border-radius:18px;
  padding:14px 14px 14px 16px;
  display:flex; align-items:center; gap:12px;
  z-index:500;
  box-shadow:0 8px 40px rgba(0,0,0,.65), 0 0 0 1px rgba(124,92,191,.25);
  animation:hint-up .45s cubic-bezier(.34,1.56,.64,1) both;
}
.ios-hint::after {
  content:''; position:absolute;
  bottom:-7px; left:50%; transform:translateX(-50%);
  border:7px solid transparent; border-top-color:#4e3a7a;
  border-bottom:0;
}
@keyframes hint-up   { from{transform:translateY(120px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes hint-down { from{transform:translateY(0);opacity:1} to{transform:translateY(120px);opacity:0} }
.ios-hint-icon {
  width:36px; height:36px; border-radius:10px;
  background:rgba(124,92,191,.2); border:1px solid rgba(124,92,191,.3);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ios-hint-body { flex:1; min-width:0; }
.ios-hint-title { font-size:13px; font-weight:600; color:#c9b8ff; margin-bottom:3px; }
.ios-hint-step  { font-size:12px; color:#7a6aaa; line-height:1.5; }
.ios-hint-step strong { color:#e8e6f0; }
.ios-hint-share {
  display:inline-flex; align-items:center; justify-content:center;
  width:20px; height:20px; background:rgba(124,92,191,.25);
  border:1px solid rgba(124,92,191,.4); border-radius:5px;
  vertical-align:middle; margin:0 1px;
}
.ios-hint-close {
  background:rgba(255,255,255,.06); border:1px solid #3a3650;
  border-radius:9px; color:#7a6aaa; font-size:13px;
  width:30px; height:30px; padding:0; display:flex;

/* ── SPEAK BUTTON ── */
.speak-btn {
  background:none; border:none; font-size:22px; cursor:pointer;
  padding:2px 8px; flex:none; min-height:unset;
  opacity:0.45; transition:all .15s; display:block; margin:4px auto 0;
  touch-action:manipulation; border-radius:8px;
}
.speak-btn:hover, .speak-btn:active { opacity:1; background:rgba(124,92,191,.15); }

/* ── REVERSE (HANZI → PINYIN) MODE ── */
.pinyin.hanzi-mode { font-size:54px; letter-spacing:.1em; color:#f0eeff; font-weight:400; }
#reveal-answer { text-align:center; }
.rev-pinyin  { font-size:26px; color:#c9b8ff; font-weight:300; margin-bottom:4px; }
.rev-pos     { font-size:12px; color:#5a5870; margin-bottom:6px; }
.rev-english { font-size:15px; color:#8a889e; }

/* ── WORD LIST STROKE BTN FIX ── */
.wl-card { padding:10px 8px 10px !important; }
.wl-stroke-btn {
  position:static !important; transform:none !important;
  left:auto !important; bottom:auto !important;
  display:block; margin:6px auto 0;
  padding:4px 10px; font-size:11px;
}

/* ── TYPING MODE ── */
.type-input-wrap { margin-bottom:14px; }
.type-input {
  width:100%; padding:14px 16px;
  background:#141420; border:2px solid #3a3650;
  border-radius:14px; color:#f0eeff;
  font-size:22px; font-family:inherit;
  outline:none; transition:border-color .2s;
  text-align:center;
}
.type-input:focus { border-color:#7c5cbf; }
.type-input::placeholder { color:#3a384a; font-size:14px; letter-spacing:0; }
.type-input:disabled { opacity:.5; }
.type-result {
  margin-bottom:10px; padding:10px 14px;
  border-radius:10px; font-size:13px; font-weight:500;
  display:none; text-align:center; line-height:1.6;
}
.type-result.visible { display:block; }
.type-result.correct { background:#1a3a22; color:#80d080; }
.type-result.wrong   { background:#3a1a1a; color:#f08080; }
.type-result .tr-answer { font-size:20px; color:#f0eeff; display:block; margin-top:4px; }

/* ── STATS MODAL ── */
.stats-total { text-align:center; padding:14px 16px 6px; font-size:12px; color:#5a5870; }
.stats-total strong { font-size:20px; color:#c9b8ff; font-weight:600; }
.stats-num-row { display:flex; gap:8px; padding:8px 16px 14px; }
.stats-num-box { flex:1; padding:10px 6px; border-radius:10px; text-align:center; }
.stats-num-box .sn-num { font-size:24px; font-weight:600; }
.stats-num-box .sn-lbl { font-size:9px; opacity:.75; text-transform:uppercase; letter-spacing:.06em; }
.sn-mastered { background:#221a33; color:#c9b8ff; }
.sn-review   { background:#1a2a1a; color:#4aad7a; }
.sn-learning { background:#2a1f10; color:#d4943a; }
.sn-new      { background:#152030; color:#4a9fe0; }
.stats-ch-list { padding:0 16px 14px; }
.stats-ch-item { margin-bottom:12px; }
.stats-ch-label { display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; color:#8a889e; }
.stats-ch-pct   { font-size:11px; color:#7a6aaa; }
.stats-ch-bar   { height:8px; background:#2e2c3e; border-radius:4px; overflow:hidden; display:flex; }
.stats-bar-seg-m { height:100%; background:#7c5cbf; }
.stats-bar-seg-r { height:100%; background:#4aad7a; }
.stats-bar-seg-l { height:100%; background:#d4943a; }

/* ── ALL-CHAPTERS word list ── */
.wl-ch-tag {
  display:inline-block; font-size:8px; padding:1px 5px; border-radius:4px;
  background:#1e1c2e; color:#6a5a9a; margin-bottom:3px; font-weight:600;
}
.wl-modal-tabs { display:flex; gap:6px; padding:8px 16px 2px; flex-shrink:0; }
.wl-tab-btn {
  padding:6px 14px; background:#2e2c3e; border:none;
  border-radius:7px; color:#7a6aaa; font-size:12px; cursor:pointer; flex:none;
  touch-action:manipulation; min-height:34px; transition:all .15s;
}
.wl-tab-btn.active { background:#7c5cbf; color:#fff; }
.wl-tab-btn:hover:not(.active) { background:#3a3850; }

/* ── LESSON MODAL ── */
.lesson-box { max-height:92dvh; }
.lesson-tabs { display:flex; gap:6px; padding:8px 16px 0; flex-shrink:0; flex-wrap:wrap; }
.lesson-tab-btn {
  padding:6px 16px; background:#2e2c3e; border:none;
  border-radius:7px; color:#7a6aaa; font-size:12px; cursor:pointer;
  touch-action:manipulation; min-height:34px; transition:all .15s;
}
.lesson-tab-btn.active { background:#7c5cbf; color:#fff; }
.lesson-tab-btn:hover:not(.active) { background:#3a3850; }
.lesson-content { overflow-y:auto; max-height:72dvh; padding:16px; }

/* Texts tab */
.text-block { margin-bottom:24px; }
.text-block-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
.text-block-header-left { flex:1; }
.text-block-title { font-size:17px; font-weight:600; color:#c9b8ff; margin-bottom:2px; }
.text-block-sub { font-size:11px; color:#7a6aaa; }
.text-read-all-btn {
  padding:5px 12px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:12px; cursor:pointer;
  white-space:nowrap; flex:none; transition:all .15s; min-height:32px;
  touch-action:manipulation;
}
.text-read-all-btn:hover { background:#2a2540; color:#c9b8ff; border-color:#7c5cbf; }
.text-read-all-btn.playing { background:#2a2540; color:#c9b8ff; border-color:#7c5cbf; }
.text-para-wrap { position:relative; margin-bottom:16px; }
.text-para-zh { font-size:16px; line-height:1.9; color:#e8e6f0; margin-bottom:4px; padding-right:32px; }
.text-para-speak {
  position:absolute; top:2px; right:0;
  background:none; border:none; font-size:16px; cursor:pointer;
  opacity:0.35; transition:opacity .15s; padding:2px 4px;
  min-height:unset; touch-action:manipulation; border-radius:6px;
}
.text-para-speak:hover, .text-para-speak.playing { opacity:1; background:rgba(124,92,191,.15); }
.text-para-py { font-size:12px; line-height:1.7; color:#7c5cbf; margin-bottom:5px; font-style:italic; }
.text-para-en { font-size:12px; line-height:1.6; color:#7a7888; margin-bottom:0; border-left:2px solid #2e2c3e; padding-left:10px; }
.text-source { font-size:11px; color:#5a5870; margin-top:8px; }

/* Grammar tab */
.grammar-item { border:1px solid #2e2c3e; border-radius:10px; margin-bottom:10px; overflow:hidden; }
.grammar-header { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; cursor:pointer; background:#141420; user-select:none; touch-action:manipulation; }
.grammar-title-zh { font-size:15px; color:#c9b8ff; font-weight:600; }
.grammar-title-py { font-size:12px; color:#7c5cbf; margin-left:8px; }
.grammar-title-en { font-size:11px; color:#7a7888; margin-top:3px; }
.grammar-chevron { color:#5a5870; font-size:14px; transition:transform .2s; flex-shrink:0; margin-left:8px; }
.grammar-header.gopen .grammar-chevron { transform:rotate(180deg); }
.grammar-body { padding:12px 14px; background:#0d0d16; border-top:1px solid #2e2c3e; display:none; }
.grammar-body.gopen { display:block; }
.grammar-rule { font-size:13px; color:#a0a0b8; margin-bottom:10px; line-height:1.7; }
.grammar-rule strong { color:#e8e6f0; }
.grammar-example { background:#141420; border-radius:8px; padding:8px 12px; margin-bottom:6px; }
.grammar-ex-zh { font-size:15px; color:#e8e6f0; margin-bottom:2px; line-height:1.6; }
.grammar-ex-py { font-size:11px; color:#7c5cbf; margin-bottom:1px; }
.grammar-ex-en { font-size:11px; color:#7a7888; }
.grammar-note { background:#1e1a2e; border-radius:6px; padding:8px 10px; margin:8px 0; font-size:12px; color:#c9b8ff; border-left:3px solid #7c5cbf; }

/* Exercises tab */
.ex-section { margin-bottom:24px; }
.ex-section-title { font-size:13px; font-weight:600; color:#9a88cc; margin-bottom:10px; }
.ex-hint { font-size:11px; color:#7c5cbf; margin-bottom:10px; background:#1e1a2e; padding:6px 10px; border-radius:6px; }
.ex-item { margin-bottom:14px; }
.ex-item-q { font-size:14px; color:#e8e6f0; line-height:1.7; }
.mc-options { display:flex; flex-direction:column; gap:6px; margin-top:7px; }
.mc-opt { padding:9px 12px; background:#141420; border:1px solid #2e2c3e; border-radius:8px; cursor:pointer; font-size:13px; color:#9a88cc; touch-action:manipulation; transition:all .15s; }
.mc-opt:hover:not(.correct):not(.wrong) { border-color:#4e4c5e; color:#c9b8ff; }
.mc-opt.correct { background:#1a3a22; border-color:#4aad7a; color:#80d080; pointer-events:none; }
.mc-opt.wrong   { background:#3a1a1a; border-color:#e05555; color:#f08080; }
.fill-wrap { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:4px; }
.fill-blank-input { background:#141420; border:1px solid #2e2c3e; border-radius:6px; color:#e8e6f0; font-size:15px; padding:5px 10px; width:90px; text-align:center; outline:none; font-family:inherit; transition:border-color .15s; }
.fill-blank-input:focus { border-color:#7c5cbf; }
.fill-blank-input.correct { border-color:#4aad7a; background:#1a3a22; color:#80d080; }
.fill-blank-input.wrong   { border-color:#e05555; background:#3a1a1a; color:#f08080; }
.fill-check-btn { padding:6px 14px; background:#2e2c3e; border:none; border-radius:7px; color:#c9b8ff; font-size:13px; cursor:pointer; touch-action:manipulation; }
.fill-check-btn:hover { background:#3a3850; }

/* ── EXAMPLE PREVIEW (shown on card reveal) ── */
.card-ex-preview {
  margin-top:8px; padding:10px 14px;
  background:#0f0f1a; border:1px solid #2a2840; border-radius:10px;
  display:none;
}
.card-ex-preview.show { display:block; }
.cep-label { font-size:9px; color:#5a5870; text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.cep-zh { font-size:15px; color:#d0ceec; line-height:1.6; }
.cep-en { font-size:11px; color:#6a6880; margin-top:3px; }

/* ── SWIPE HINT ── */
.swipe-hint {
  font-size:10px; color:#3a3850; text-align:center; margin-top:6px;
  letter-spacing:.04em; transition:opacity .3s;
}

/* ── VOCAB HIGHLIGHT in lesson text ── */
.vocab-hl {
  color:#c9b8ff; border-bottom:1px dotted #7c5cbf;
  cursor:pointer; touch-action:manipulation;
  transition:background .15s; border-radius:2px; padding:0 1px;
}
.vocab-hl:hover, .vocab-hl:active { background:#2a1f44; }

/* ── STREAK ── */
.streak-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:12px; font-weight:600; color:#f0a040;
  background:#2a1a08; border:1px solid #4a3010;
  border-radius:20px; padding:3px 10px;
  margin-bottom:6px; cursor:default;
}
.streak-badge.dead { color:#5a5870; background:#1a1a20; border-color:#2e2c3e; }

/* ── SEARCH MODAL ── */
#search-modal .modal-box { border-radius:20px; max-height:85dvh; }
.search-input-wrap { padding:12px 16px; border-bottom:1px solid #2e2c3e; flex-shrink:0; }
#search-input {
  width:100%; padding:12px 14px;
  background:#0f0f14; border:1px solid #3a3650;
  border-radius:12px; color:#e8e6f0; font-size:16px;
  outline:none; font-family:inherit;
}
#search-input:focus { border-color:#7c5cbf; }
#search-input::placeholder { color:#3a384a; }
.search-results { overflow-y:auto; max-height:60dvh; padding:8px 0; }
.search-result-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; cursor:pointer; transition:background .12s;
}
.search-result-item:hover { background:#1a1828; }
.sr-hanzi  { font-size:22px; color:#f0eeff; min-width:46px; }
.sr-py     { font-size:12px; color:#7c5cbf; }
.sr-en     { font-size:12px; color:#5a5870; flex:1; }
.sr-ch     { font-size:10px; color:#3a384a; background:#1e1c2e; padding:2px 6px; border-radius:4px; flex-none; }
.search-empty { text-align:center; padding:24px 16px; font-size:13px; color:#4e4c5e; }

/* ── CONFETTI ── */
#confetti-canvas {
  position:fixed; inset:0; pointer-events:none; z-index:9998;
  width:100%; height:100%;
}

/* ── EXPORT/IMPORT ── */
.backup-row { display:flex; gap:8px; padding:0 16px 14px; }
.backup-btn {
  flex:1; padding:10px 14px; background:#2e2c3e; border:none;
  border-radius:8px; color:#c9b8ff; font-size:13px; cursor:pointer;
  touch-action:manipulation; min-height:40px; transition:all .15s;
}
.backup-btn:hover { background:#3a3850; }
.backup-btn.danger { color:#f08080; background:#3a1a1a; }
.backup-btn.danger:hover { background:#4a2020; }

/* ── LESSON PINYIN TOGGLE ── */
.lesson-modal-toolbar {
  display:flex; gap:6px; padding:4px 16px 8px; flex-shrink:0;
}
.lmt-btn {
  padding:5px 12px; background:#2e2c3e; border:none;
  border-radius:7px; color:#7a6aaa; font-size:12px; cursor:pointer;
  touch-action:manipulation; transition:all .15s;
}
.lmt-btn:hover { background:#3a3850; color:#c9b8ff; }
.lmt-btn.active { background:#1e1a2e; border:1px solid #7c5cbf; color:#c9b8ff; }
.hide-py .text-para-py { display:none !important; }

/* ── VOCAB POPUP ── */
.vocab-popup {
  position:fixed; z-index:9999;
  background:#1e1c30; border:1px solid #4a3880;
  border-radius:12px; padding:12px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  min-width:180px; max-width:260px;
  display:none; pointer-events:auto;
}
.vocab-popup.show { display:block; }
.vp-hanzi { font-size:26px; color:#e8e6f0; font-weight:500; }
.vp-pinyin { font-size:13px; color:#7c5cbf; margin:2px 0; }
.vp-pos { font-size:10px; color:#5a5870; text-transform:uppercase; letter-spacing:.06em; }
.vp-en  { font-size:13px; color:#a8a6c0; margin-top:4px; }
.vp-close { position:absolute; top:8px; right:10px; background:none; border:none; color:#5a5870; font-size:16px; cursor:pointer; line-height:1; padding:0; }
</style>
</head>

            zh:'收入越高就越快乐吗？那可不一定。我现在这份工作，工资比前一份工作确实高了一倍多，开始的时候我是多么满足啊！可是，我渐渐地觉得有点儿不够了，因为在这家公司，不但白天事多得做不完，而且差不多每天晚上都不能按时下班，有时候得加班到第二天早上两点以后。回到家，天都快亮了！得到的确实比以前多了，可付出的更多，心里总是感觉有点儿不公平。',
            py:'Shōurù yuè gāo jiù yuè kuàilè ma? Nà kě bù yīdìng. Wǒ xiànzài zhè fèn gōngzuò, gōngzī bǐ qián yī fèn gōngzuò quèshí gāo le yī bèi duō, kāishǐ de shíhòu wǒ shì duōme mǎnzú a! Kěshì, wǒ jiànjiàn de juéde yǒu diǎnr bùgòu le, yīnwèi zài zhè jiā gōngsī, bùdàn báitiān shì duō dé zuò bù wán, érqiě chàbuduō měi tiān wǎnshang dōu bù néng ànshí xiàbān, yǒu shíhòu děi jiābān dào dì èr tiān zǎoshang liǎng diǎn yǐhòu. Huí dào jiā, tiān dōu kuài liàng le! Dédào de quèshí bǐ yǐqián duō le, kě fùchū de gèng duō, xīnlǐ zǒng shì gǎnjué yǒu diǎnr bù gōngpíng.',
            en:'Does a higher income always mean greater happiness? Not necessarily at all. My current job pays more than double my previous one, and at first I felt so satisfied! But gradually I felt it wasn\'t enough — because at this company, not only is there too much daytime work to finish, but nearly every evening I can\'t leave on time, sometimes working overtime until past 2am the next morning. By the time I get home, dawn is almost breaking! I earn more than before, but give even more — and I always feel a little bit unfair inside.'
          },
          {
            zh:'我的朋友们也都是公司白领，收入都不错，可是有近一半的人觉得自己"不快乐的时候多"，甚至有人表示"很痛苦，想换工作"。原因当然是多种多样的。工作太辛苦是原因之一，对报酬不满足，觉得不值得，也是一个常见的原因。当然，还有其他原因，如，觉得自己在这样的单位没有发展前途，对单位的管理制度不满意，或者对单位的工作环境不适应，等等。那就换一个工作吧。换一个工作就一定快乐吗？难说。',
            py:'Wǒ de péngyoumen yě dōu shì gōngsī báilǐng, shōurù dōu bùcuò, kěshì yǒu jìn yī bàn de rén juéde zìjǐ "bù kuàilè de shíhòu duō", shènzhì yǒu rén biǎoshì "hěn tòngkǔ, xiǎng huàn gōngzuò". Yuányīn dāngrán shì duō zhǒng duō yàng de. Gōngzuò tài xīnkǔ shì yuányīn zhī yī, duì bàochou bù mǎnzú, juéde bù zhíde, yě shì yī gè chángjiàn de yuányīn. Dāngrán, hái yǒu qítā yuányīn, rú, juéde zìjǐ zài zhèyàng de dānwèi méiyǒu fāzhǎn qiántú, duì dānwèi de guǎnlǐ zhìdù bù mǎnyì, huòzhě duì dānwèi de gōngzuò huánjìng bù shìyìng, děngděng. Nà jiù huàn yī gè gōngzuò ba. Huàn yī gè gōngzuò jiù yīdìng kuàilè ma? Nán shuō.',
            en:'My friends are also all white-collar workers with decent incomes, yet nearly half of them feel their "unhappy moments outnumber happy ones" — some even say they\'re suffering and want to change jobs. The reasons are of course many and varied. Work being too hard is one reason; being unsatisfied with pay and feeling it isn\'t worth it is another common reason. There are also other reasons: feeling there is no room for growth at your current workplace, being dissatisfied with management systems, or not adapting to the work environment, and so on. So just change jobs then. But does changing jobs guarantee happiness? Hard to say.'

            en:'One day, Lucky God passed by a park and noticed a young man sitting on a bench, constantly staring at the hotel across the street. Lucky God walked up to him and said: "Why do you keep staring at that hotel — do you really want to stay there?" "Of course," the young man said, "but I have no money, can\'t even find a job, and can only sleep on this park bench. But every night I dream of moving into that hotel." Lucky God smiled and said: "Today I will grant your wish. I\'ve booked the best room in that hotel — you can stay there for a month."'

          {

            py:'Liǎng zhōu yǐhòu, xìngyùn zhī shén xiǎng kàn kan xiǎohuǒzi shì bu shì juéde mǎnyì, yīnwèi tā zuì xǐhuān kàndào rénmen zài xìngyùn zhōng huòdé kuàilè. Kěshì, tā fāxiàn xiǎohuǒzi yǐjīng bān huí gōngyuán lái le. Xìngyùn zhī shén yǒu diǎnr shēngqì de wèn xiǎohuǒzi: "Zěnme, jiǔdiàn lǐ fúwù bù hǎo ma?" Xiǎohuǒzi shuō: "Xièxie nín de hǎoyì, nín bù zhīdào, wǒ shuì zài gōngyuán lǐ, měi tiān dōu néng mèngjiàn zìjǐ shuì zài jiǔdiàn lǐ, nà zhǒng gǎnjué tài měimiào le; kěshì wǒ shuì zài jiǔdiàn lǐ, què lǎoshi mèngjiàn zìjǐ yòu huí dào bīnglěng de cháng dèng shàng, zhè mèng zhēn shì tài kěpà le. Wǒ xiǎng hái shi huí dào zhèlǐ shuì de shūfu."',
            en:'Two weeks later, Lucky God wanted to check on the young man — he loved seeing people find happiness through good fortune. But he found the young man had moved back to the park. Lucky God asked, a little crossly: "What happened — was the hotel service bad?" The young man replied: "Thank you for your kindness, but you don\'t understand. When I slept in the park, I dreamed every night of sleeping in the hotel — that feeling was so wonderful. But when I slept in the hotel, I kept dreaming of going back to the ice-cold bench. That dream was truly terrible. I think I sleep better here."'

        num:'§1', title:'狼和鹿', en:'Wolves and Deer',
        paragraphs:[
          {
            zh:'20世纪初，在中国北方的一片森林里，到处可以看到一群群可爱的鹿。除了鹿以外，还有一群群的狼，它们是鹿的敌人。',
            py:'Èrshí shìjì chū, zài Zhōngguó běifāng de yī piàn sēnlín lǐ, dàochù kěyǐ kàndào yī qún qún kě\'ài de lù. Chúle lù yǐwài, hái yǒu yī qún qún de láng, tāmen shì lù de dírén.',
            en:'In the early 20th century, in a forest in northern China, you could see herds of lovely deer everywhere. Besides the deer, there were also packs of wolves — the deer\'s enemies.'
          },
          {
            zh:'当地政府很想保护那里的鹿，于是就派了一些人到那里去消灭狼群。短短二十几年里，那些狼一群一群地被人们杀死了。鹿一天天多起来，它们成了森林中的主人，过着没有危险、自由自在的幸福生活。',
            py:'Dāngdì zhèngfǔ hěn xiǎng bǎohù nàlǐ de lù, yúshì jiù pài le yīxiē rén dào nàlǐ qù xiāomiè láng qún. Duǎnduǎn èrshí jǐ nián lǐ, nàxiē láng yī qún yī qún de bèi rénmen shā sǐ le. Lù yītiāntiān duō qǐlái, tāmen chéng le sēnlín zhōng de zhǔrén, guò zhe méiyǒu wēixiǎn, zìyóuzìzài de xìngfú shēnghuó.',
            en:'The local government wanted to protect the deer, so it sent people to wipe out the wolf packs. In just twenty-some years, the wolves were killed off pack by pack. The deer grew more numerous day by day, becoming the masters of the forest, living a happy, carefree life free of danger.'
          },
          {
            zh:'很快，森林里的鹿超过了十万只。十万多只鹿在森林中找东西吃，所有能吃的差不多都叫鹿吃光了。',
            py:'Hěn kuài, sēnlín lǐ de lù chāoguò le shí wàn zhī. Shí wàn duō zhī lù zài sēnlín zhōng zhǎo dōngxi chī, suǒyǒu néng chī de chàbuduō dōu jiào lù chī guāng le.',
            en:'Soon the deer in the forest exceeded 100,000. Over 100,000 deer searched for food in the forest, and nearly everything edible was eaten up by the deer.'
          },
          {
            zh:'灾难终于来了。由于找不到吃的，鹿一只一只地饿死了。接着，许多鹿又得了重病。几年以后，鹿的数量从十万只减少到四万只。到40年代初，森林中一共只剩下不到八千只鹿了。',
            py:'Zāinàn zhōngyú lái le. Yóuyú zhǎo bu dào chī de, lù yī zhī yī zhī de è sǐ le. Jiēzhe, xǔduō lù yòu dé le zhòng bìng. Jǐ nián yǐhòu, lù de shùliàng cóng shí wàn zhī jiǎnshǎo dào sì wàn zhī. Dào sìshí niándài chū, sēnlín zhōng yīgòng zhǐ shèng xià bú dào bā qiān zhī lù le.',
            en:'Disaster finally came. With nothing left to eat, the deer starved one by one. Then many deer fell seriously ill. A few years later, the deer population dropped from 100,000 to 40,000. By the early 1940s, fewer than 8,000 deer remained in the entire forest.'

            zh:'人们这时才觉得后悔。森林里既需要鹿，也需要狼。我们不能破坏大自然的平衡关系。',

            en:'Only then did people feel regret. The forest needs both deer and wolves. We must not destroy the balance of nature.'

      {
        num:'§2', title:'韩国人的环保意识', en:'Koreans\' Environmental Awareness',
        paragraphs:[
          {
            zh:'去年夏天，我们去韩国旅游。当第一顿晚饭快结束的时候，韩国导游举起了一根细细的牙签，脸上带着自豪："这是我们使用的牙签，是用淀粉做的，很环保啊，还可以吃呢。"说完，放进嘴里吃起来。我半信半疑地拿起一根，也放到嘴里去试了一下，确实不错，好用，也好吃。',
            py:'Qùnián xiàtiān, wǒmen qù Hánguó lǚyóu. Dāng dì yī dùn wǎnfàn kuài jiéshù de shíhòu, Hánguó dǎoyóu jǔ qǐ le yī gēn xì xì de yáqiān, liǎn shàng dài zhe zìháo: "Zhè shì wǒmen shǐyòng de yáqiān, shì yòng diànfěn zuò de, hěn huánbǎo a, hái kěyǐ chī ne." Shuō wán, fàng jìn zuǐlǐ chī qǐlái. Wǒ bàn xìn bàn yí de ná qǐ yī gēn, yě fàng dào zuǐlǐ qù shì le yīxià, quèshí bùcuò, hǎoyòng, yě hǎochī.',
            en:'Last summer, we went to South Korea on a trip. When the first dinner was almost over, the Korean tour guide held up a thin toothpick with a proud look: "This is the toothpick we use — it\'s made from starch, very eco-friendly, and you can actually eat it." After saying this, he put it in his mouth. I picked one up half-skeptically, put it in my mouth to try — it was actually quite good: useful and tasty.'
          },
          {
            zh:'第二天晚上，当我们在一家海鲜餐厅吃饭时，我发现，餐桌上的一双双筷子，不是那种一次性木筷，而是铁筷子，既容易消毒，又节约了木材。',
            py:'Dì èr tiān wǎnshang, dāng wǒmen zài yī jiā hǎixiān cāntīng chīfàn shí, wǒ fāxiàn, cānzhuō shàng de yī shuāng shuāng kuàizi, bú shì nà zhǒng yīcìxìng mù kuài, ér shì tiě kuàizi, jì róngyì xiāodú, yòu jiéyuē le mùcái.',

            py:'Hòulái, wǒmen hái zhùyì dào, bàngwǎn shí, Shǒu\'ěr jiē shàng de yī zhǎn zhǎn lùdēng bú shì tóngshí dǎkāi, ér shì yī zhǎn yī zhǎn dǎkāi de. Dāng tiān zài hēi yīxiē de shíhòu, suǒyǒu de lùdēng cái yīqí dǎkāi. Zhèyàng jiù jiéyuē le diànlì. Hánguó rén de huánbǎo yìshí, gěi wǒmen liú xià le hěn shēn de yìnxiàng.',
            en:'Later we also noticed that in the evening, the street lights along Seoul\'s streets did not all turn on at the same time — they came on one by one. Only when it got a bit darker did all the lights turn on together, saving electricity. The Korean people\'s environmental awareness left a very deep impression on us.'
          }

  5: {
    texts:[
      {
        num:'§1', title:'住在一幅叫"丽江"的画里', en:'Living in a Picture Called "Lijiang"',
        paragraphs:[
          {
            zh:'丽江是一座没有城墙的城。去丽江，当然是住在老城的小客店里。客店外，鲜花开满了院子，小鸟在树上唱歌；客店里，女主人亲切地向你微笑。',
            py:'Lìjiāng shì yī zuò méiyǒu chéngqiáng de chéng. Qù Lìjiāng, dāngrán shì zhù zài lǎochéng de xiǎo kèdiàn lǐ. Kèdiàn wài, xiānhuā kāi mǎn le yuànzi, xiǎo niǎo zài shù shàng chànggē; kèdiàn lǐ, nǚ zhǔrén qīnqiè de xiàng nǐ wēixiào.',
            en:'Lijiang is a city without walls. When you go to Lijiang, of course you stay in a small inn in the old town. Outside the inn, the courtyard is full of flowers and birds sing in the trees; inside, the innkeeper smiles warmly at you.'
          },
          {
            zh:'一大早起来，沿着小溪，踏着青石板路走下去，你看到准备开门的店主、上学的孩子、喝茶的老人、买菜的大妈，从那些古老的小楼里慢慢走出来，感觉好像回到了几百年以前。你再往远处看，山是那么的绿，天是那么的蓝。',
            py:'Yīdàzǎo qǐlái, yán zhe xiǎo xī, tà zhe qīng shí bǎn lù zǒu xià qù, nǐ kàndào zhǔnbèi kāimén de diànzhǔ, shàng xué de háizi, hē chá de lǎorén, mǎi cài de dàmā, cóng nàxiē gǔlǎo de xiǎo lóu lǐ mànmàn zǒu chū lái, gǎnjué hǎoxiàng huí dào le jǐ bǎi nián yǐqián. Nǐ zài wǎng yuǎnchù kàn, shān shì nàme de lǜ, tiān shì nàme de lán.',
            en:'Getting up early, walking alongside the stream, stepping along the bluestone paths, you see shopkeepers about to open up, children heading to school, elders drinking tea, grandmothers shopping for vegetables — all slowly emerging from those ancient little buildings. You feel as if you\'ve traveled back hundreds of years. Looking further into the distance, the mountains are so green, the sky so blue.'
          },
          {
            zh:'街上渐渐热闹起来，古城在人们的轻声细语中渐渐地醒过来了。你慢慢地走着，穿着五颜六色衣服的游客像瀑水一样向你涌过来，空气中都是花草和咖啡的味道。',
            py:'Jiē shàng jiànjiàn rènào qǐlái, gǔchéng zài rénmen de qīng shēng xì yǔ zhōng jiànjiàn de xǐng guòlái le. Nǐ mànmàn de zǒu zhe, chuān zhe wǔ yán liù sè yīfu de yóukè xiàng pùshuǐ yīyàng xiàng nǐ yǒng guòlái, kōngqì zhōng dōu shì huācǎo hé kāfēi de wèidào.',
            en:'The streets gradually grew lively; the old town slowly woke up amid people\'s soft whispers. You walked slowly, tourists in colourful clothes surging toward you like a waterfall, the air full of the fragrance of flowers and coffee.'
          },
          {
            zh:'走着走着，一会儿就到了中午。你随便走进一个溜边的小酒吧，坐下来，要上一杯酒，再来一份丽江的小吃。你打算在这儿坐上一个下午。在轻柔的爵士乐中，时间好像停住了，你闭上眼睛，什么都想不起来了。',
            py:'Zǒu zhe zǒu zhe, yīhuìr jiù dào le zhōngwǔ. Nǐ suíbiàn zǒu jìn yī gè liū biān de xiǎo jiǔbā, zuò xiàlái, yào shàng yī bēi jiǔ, zài lái yī fèn Lìjiāng de xiǎochī. Nǐ dǎsuàn zài zhèr zuò shàng yī gè xiàwǔ. Zài qīngróu de juéshì yuè zhōng, shíjiān hǎoxiàng tíng zhù le, nǐ bì shàng yǎnjīng, shénme dōu xiǎng bù qǐlái le.',
            en:'Walking on, it is suddenly noon. You casually step into a small bar by the road, sit down, order a glass of wine and some Lijiang snacks. You plan to sit here for an entire afternoon. In the gentle jazz music, time seems to stop. You close your eyes and can\'t think of anything at all.'
          },
          {
            zh:'天慢慢地黑下来了，红红黄黄的灯光亮起来了。你来到老城的中心，听纳西古乐，看东巴乐舞。你想把这些拍下来，就有人过来拉住了你的手，于是，你跟着他们一起跳起来了……丽江是一幅画，一不小心，你也成了画里的一片风景……',
            py:'Tiān mànmàn de hēi xiàlái le, hóng hóng huáng huáng de dēngguāng liàng qǐlái le. Nǐ lái dào lǎochéng de zhōngxīn, tīng Nàxī gǔ yuè, kàn Dōngbā yuè wǔ. Nǐ xiǎng bǎ zhèxiē pāi xiàlái, jiù yǒu rén guòlái lā zhù le nǐ de shǒu, yúshì, nǐ gēn zhe tāmen yīqǐ tiào qǐlái le… Lìjiāng shì yī fú huà, yī bù xiǎoxīn, nǐ yě chéng le huà lǐ de yī piàn fēngjǐng…',
            en:'The sky slowly darkened and red-and-yellow lantern light came on. You came to the heart of the old town, listening to Naxi ancient music, watching Dongba music and dance. You tried to take a photo — and someone came over and took your hand. And so you started dancing along with them… Lijiang is a painting, and before you knew it, you too had become a piece of scenery inside it…'
          }
        ],
        source:'(根据《懒懒网》游记改写)'
      },
      {
        num:'§2', title:'北京的胡同', en:'Beijing\'s Hutongs',
        paragraphs:[
          {
            zh:'走进北京城，人们感兴趣的往往不是高楼大厦，而是那些小小的胡同。据说，最古老的胡同已经有900多年历史了。要知道老北京的味道，就要去胡同。北京人说：有名的胡同三百六，没名的胡同不计数。据说，1949年的时候，北京的胡同超过6000条，名字叫"某某胡同"的就有1330条。把这些大大小小的胡同连起来，那又是一条万里长城了。',
            py:'Zǒu jìn Běijīng chéng, rénmen gǎn xìngqù de wǎngwǎng bú shì gāolóu dàshà, ér shì nàxiē xiǎo xiǎo de hútòng. Jùshuō, zuì gǔlǎo de hútòng yǐjīng yǒu 900 duō nián lìshǐ le. Yào zhīdào lǎo Běijīng de wèidào, jiù yào qù hútòng. Běijīng rén shuō: Yǒu míng de hútòng sān bǎi liù, méi míng de hútòng bù jìshù. Jùshuō, 1949 nián de shíhòu, Běijīng de hútòng chāoguò 6000 tiáo, míngzi jiào "mǒumǒu hútòng" de jiù yǒu 1330 tiáo. Bǎ zhèxiē dà dà xiǎo xiǎo de hútòng lián qǐlái, nà yòu shì yī tiáo Wànlǐ Chángchéng le.',
            en:'When you walk into Beijing, what interests people is often not the skyscrapers, but those small hutongs. They say the oldest hutong already has over 900 years of history. To know the flavor of old Beijing, you must go to the hutongs. Beijingers say: 306 famous hutongs, countless nameless ones. They say that in 1949 Beijing had over 6,000 hutongs, with 1,330 named "such-and-such hutong." If you connected all these hutongs large and small, that would make another Great Wall.'
          },
          {
            zh:'北京的胡同大多是横平竖直的，但也有一些胡同是弯弯曲曲的，走在里面，让人分不清东南西北。有的胡同很长，最长的是东西交民巷，全长6.5公里；有的又很短，最短的是一尺大街，全长才十米左右。有的胡同很窄，比如前门的钱市胡同，最窄的地方才40厘米，两个人在胡同里迎上了，必须侧着身子才能过去。',
            py:'Běijīng de hútòng dàduō shì héng píng shù zhí de, dàn yě yǒu yīxiē hútòng shì wānwān qūqū de, zǒu zài lǐmiàn, ràng rén fēn bu qīng dōng nán xī běi. Yǒu de hútòng hěn cháng, zuì cháng de shì Dōngxī Jiāomín Xiàng, quán cháng 6.5 gōnglǐ; yǒu de yòu hěn duǎn, zuì duǎn de shì Yīchǐ Dàjiē, quán cháng cái shí mǐ zuǒyòu. Yǒu de hútòng hěn zhǎi, bǐrú Qiánmén de Qiánshì Hútòng, zuì zhǎi de dìfāng cái 40 límǐ, liǎng gè rén zài hútòng lǐ yíng shàng le, bìxū cè zhe shēnzi cái néng guòqù.',
            en:'Most of Beijing\'s hutongs run in straight horizontal and vertical lines, but some are winding and curved — you can\'t tell east from west inside them. Some are very long: the longest is East-West Jiaomin Lane at 6.5 km. Some are very short: the shortest is Yichi Street (One-Foot Street), only about 10 meters long. Some are very narrow: Qianshi Hutong near Qianmen is just 40 cm at its narrowest — two people meeting must turn sideways to pass.'
          },
          {
            zh:'千百条胡同一起组成了美丽的北京城。近年来，"胡同游"吸引了越来越多的游客。坐上三轮车，在胡同里走一走，跟北京人聊一聊，你会觉得：北京真美，最美在胡同！',
            py:'Qiānbǎi tiáo hútòng yīqǐ zǔchéng le měilì de Běijīng chéng. Jìn nián lái, "hútòng yóu" xīyǐn le yuèlái yuè duō de yóukè. Zuò shàng sānlúnchē, zài hútòng lǐ zǒu yī zǒu, gēn Běijīng rén liáo yī liáo, nǐ huì juéde: Běijīng zhēn měi, zuì měi zài hútòng!',
            en:'Hundreds upon hundreds of hutongs together form the beautiful city of Beijing. In recent years, "hutong tours" have attracted more and more visitors. Climb aboard a pedicab, walk through the hutongs, chat with Beijingers — and you will feel: Beijing is truly beautiful, and the most beautiful part is its hutongs!'
          }
        ]
      }

      {
        num:'§1', title:'终于要结婚了', en:'Getting Married at Last',
        paragraphs:[
          {
            zh:'妈妈每次打来电话，总是重复着一个说了三年的话题："你什么时候结婚啊？"虽然我已经回答不了，但还是安慰地说："快了，快了。"他妈妈打来电话，也重复同样的话题。',
            py:'Māma měi cì dǎ lái diànhuà, zǒng shì chóngfù zhe yī gè shuō le sān nián de huàtí: "Nǐ shénme shíhòu jiéhūn a?" Suīrán wǒ yǐjīng huídá bu liǎo, dàn hái shì ānwèi de shuō: "Kuài le, kuài le." Tā māma dǎ lái diànhuà, yě chóngfù tóngyàng de huàtí.',

          },
          {
            zh:'我们在一起有三年了。认识第一年，两个人就开始同居了。两个人住在一起可以节省很多费用，还能互相照顾。结婚嘛，那太麻烦了，以后再说吧。',
            py:'Wǒmen zài yīqǐ yǒu sān nián le. Rènshi dì yī nián, liǎng gè rén jiù kāishǐ tóngjū le. Liǎng gè rén zhù zài yīqǐ kěyǐ jiéshěng hěn duō fèiyòng, hái néng hùxiāng zhàogù. Jiéhūn ma, nà tài máfan le, yǐhòu zài shuō ba.',
            en:'We\'ve been together for three years. In the first year of knowing each other, we started living together. Living together saves a lot of expenses and we can look after each other. Getting married? That\'s too much trouble — we\'ll get to it later.'

          {
            zh:'可是朋友们都催我快点儿结婚，说三年了还不赶紧结婚，将来想结都结不了了，剩下的也许就只有一条路：分手。',
            py:'Kěshì péngyoumen dōu cuī wǒ kuài diǎnr jiéhūn, shuō sān nián le hái bù gǎnjǐn jiéhūn, jiānglái xiǎng jié dōu jié bu liǎo le, shèng xià de yěxǔ jiù zhǐyǒu yī tiáo lù: fēnshǒu.',
            en:'But friends keep urging me to hurry up and get married, saying that after three years without rushing into marriage, we won\'t be able to do it eventually — and maybe the only road left will be to break up.'
          },
          {
            zh:'朋友们也许是对的。我从他的眼睛中确实看到了"不想结婚"四个字。',
            py:'Péngyoumen yěxǔ shì duì de. Wǒ cóng tā de yǎnjīng zhōng quèshí kàndào le "bù xiǎng jiéhūn" sì gè zì.',
            en:'Maybe my friends are right. I have genuinely seen those four words — "doesn\'t want to get married" — in his eyes.'

          {
            zh:'一天，我们去参加一个好友的婚礼，晚上回家的路上，我不再理他，他也不说话，只是默默地开车。到家后，我把卫生间的门关上，洗脸，洗澡，擦地，在里面足足待了两个小时，他连问也没有问一声。当我出来时，发现他已经躺在床上睡着了。我把他叫醒了，一边哭，一边跟他吵了一架。',
            py:'Yī tiān, wǒmen qù cānjiā yī gè hǎoyǒu de hūnlǐ, wǎnshang huí jiā de lùshang, wǒ bù zài lǐ tā, tā yě bù shuōhuà, zhǐshì mòmò de kāichē. Dào jiā hòu, wǒ bǎ wèishēngjiān de mén guān shàng, xǐliǎn, xǐzǎo, cā dì, zài lǐmiàn zúzú dāi le liǎng gè xiǎoshí, tā lián wèn yě méiyǒu wèn yī shēng. Dāng wǒ chūlái shí, fāxiàn tā yǐjīng tǎng zài chuáng shàng shuì zháo le. Wǒ bǎ tā jiào xǐng le, yībiān kū, yībiān gēn tā chǎo le yī jià.',

        paragraphs:[
          {
            zh:'单身现象正在全球流行。据说，40%的瑞士人过着单身生活。在英国，有800万单身族。不少丹麦人和德国人也都喜欢一个人住。美国是一个单身族很多的国家。在有些地方，单身族的生活甚至比有家庭的人更加丰富多彩。',
            py:'Dānshēn xiànxiàng zhèngzài quánqiú liúxíng. Jùshuō, bǎifēnzhī sìshí de Ruìshì rén guò zhe dānshēn shēnghuó. Zài Yīngguó, yǒu bābǎi wàn dānshēn zú. Bùshǎo Dānmài rén hé Déguó rén yě dōu xǐhuān yī gè rén zhù. Měiguó shì yī gè dānshēn zú hěn duō de guójiā. Zài yǒuxiē dìfāng, dānshēn zú de shēnghuó shènzhì bǐ yǒu jiātíng de rén gèngjiā fēngfù duō cǎi.',
            en:'The phenomenon of single life is spreading worldwide. It is said that 40% of Swiss people live a single life. In the UK, there are 8 million single people. Many Danes and Germans also prefer living alone. The US is a country with a large single population. In some places, the lives of single people are even richer and more colorful than those with families.'

            zh:'在中国的大城市，单身现象也越来越普遍。几年前，单身族甚至有了自己的节日——11月11日。父母眼中的终身大事，在他们看来，好像没啥大不了的。',
            py:'Zài Zhōngguó de dà chéngshì, dānshēn xiànxiàng yě yuèlái yuè pǔbiàn. Jǐ nián qián, dānshēn zú shènzhì yǒu le zìjǐ de jiérì——shíyī yuè shíyī rì. Fùmǔ yǎn zhōng de zhōngshēn dà shì, zài tāmen kàn lái, hǎoxiàng méi shá dàbuliǎo de.',

          {
            zh:'单身族们大多受过很好的教育，经济条件不错，懂得享受生活。他们的日子过得一点儿也不孤单。他们通过电话、电子邮件和亲朋好友保持着亲密的关系。周末的时候，他们也常常跟朋友约会，跟家人见面。',
            py:'Dānshēn zú men dàduō shòuguò hěn hǎo de jiàoyù, jīngjì tiáojiàn bùcuò, dǒngde xiǎngshòu shēnghuó. Tāmen de rìzi guò de yīdiǎnr yě bù gūdān. Tāmen tōngguò diànhuà, diànzǐ yóujiàn hé qīn péng hǎoyǒu bǎochí zhe qīnmì de guānxi. Zhōumò de shíhòu, tāmen yě chángcháng gēn péngyou yuēhuì, gēn jiārén jiànmiàn.',

  7: {
    texts: [
      {
        num:'§1', title:'白领的"网络依赖"', en:'White-collar Workers\' "Internet Addiction"',
        paragraphs:[
          {
            zh:'"一会儿我们MSN上见吧。""我在QQ上给你留言了。"这大概是年轻白领之间现在最流行的两句话了。',
            py:'"Yīhuìr wǒmen MSN shàng jiàn ba." "Wǒ zài QQ shàng gěi nǐ liúyán le." Zhè dàgài shì niánqīng báilǐng zhījiān xiànzài zuì liúxíng de liǎng jù huà le.',
            en:'"See you on MSN in a bit." "I left you a message on QQ." These are probably the two most popular phrases among young white-collar workers right now.'
          },
          {
            zh:'陈小姐是做销售工作的。为了加强跟客户的联系，她经常在MSN上跟客户聊天，工作、家庭、爱好等等，什么都聊。通过网络，双方的关系变得更近了。但哪天跟对方见了面，她却发现，其实没什么可说的，所有能说的东西她们都已经谈过了，怎么也想不出新的话题。但是，等双方各自回到网上，她马上感到又有说不完的话题要跟别人聊了。',
            py:'Chén xiǎojiě shì zuò xiāoshòu gōngzuò de. Wèile jiāqiáng gēn kèhù de liánxì, tā jīngcháng zài MSN shàng gēn kèhù liáotiān, gōngzuò, jiātíng, àihào děng děng, shénme dōu liáo. Tōngguò wǎngluò, shuāngfāng de guānxi biàn de gèng jìn le. Dàn nǎ tiān gēn duìfāng jiànle miàn, tā què fāxiàn, qíshí méi shénme kě shuō de, suǒyǒu néng shuō de dōngxi tāmen dōu yǐjīng tán guò le, zěnme yě xiǎng bu chū xīn de huàtí. Dànshì, děng shuāngfāng gèzì huídào wǎng shàng, tā mǎshàng gǎndào yòu yǒu shuō bu wán de huàtí yào gēn biérén liáo le.',
            en:'Ms. Chen works in sales. To strengthen contact with clients, she often chats with them on MSN — work, family, hobbies and everything else. Through the internet their relationships grew closer. But whenever she actually met a client in person, she found there was nothing to say — everything had already been discussed online, and she couldn\'t think of new topics. Yet once each of them got back online, she immediately felt she had endless things to chat about again.'
          },
          {
            zh:'像陈小姐这样的情况还有很多。上网已经成为大部分白领们工作、生活的一个重要的组成部分。他们不仅工作中每天要利用网络，而且生活中也离不开网络。只要一上网，就能看到许多亲朋好友及工作伙伴，有什么问题可以随时问，有什么信息也可以随时分享。渐渐地，白领们对互联网的依赖变得越来越严重了。',
            py:'Xiàng Chén xiǎojiě zhèyàng de qíngkuàng hái yǒu hěn duō. Shàngwǎng yǐjīng chéngwéi dà bùfēn báilǐngmen gōngzuò, shēnghuó de yī gè zhòngyào de zǔchéng bùfēn. Tāmen bùjǐn gōngzuò zhōng měitiān yào lìyòng wǎngluò, érqiě shēnghuó zhōng yě lí bu kāi wǎngluò. Zhǐyào yī shàngwǎng, jiù néng kàndào xǔduō qīn péng hǎoyǒu jí gōngzuò huǒbàn, yǒu shénme wèntí kěyǐ suíshí wèn, yǒu shénme xìnxi yě kěyǐ suíshí fēnxiǎng. Jiànjiàn de, báilǐngmen duì hùliánwǎng de yīlài biàn de yuèlái yuè yánzhòng le.',
            en:'Situations like Ms. Chen\'s are very common. Going online has already become an important part of most white-collar workers\' professional and personal lives. They use the internet every day at work, and their personal lives are inseparable from it too. The moment they go online they can see friends, family, and work partners — any question can be asked any time, any information shared any time. Gradually, white-collar workers\' dependence on the internet has grown more and more serious.'
          },
          {
            zh:'很多白领要找人时，第一个念头就是上MSN，发现对方不在，再转到QQ，然后再上博客，如果实在是哪儿都找不到，那干脆就在网上留言。',
            py:'Hěn duō báilǐng yào zhǎo rén shí, dì yī gè niàntou jiùshì shàng MSN, fāxiàn duìfāng bú zài, zài zhuǎn dào QQ, ránhòu zài shàng bókè, rúguǒ shízài shì nǎr dōu zhǎo bu dào, nà gǎncuì jiù zài wǎng shàng liúyán.',
            en:'When many white-collar workers want to reach someone, their first thought is to go on MSN. If the person isn\'t there, they switch to QQ, then check their blog — and if they still can\'t find them anywhere, they simply leave a message online.'
          }
        ]

      {
        num:'§2', title:'一个真正自由的人', en:'A Truly Free Person',
        paragraphs:[
          {
            zh:'在我们这个时代，谁都离不开网络和手机。要是有人对你说：我根本没有电子邮箱，我也从来不使用手机。你会有什么反应？你是不是会觉得他太落后了？是不是会把他看成一个怪物？',
            py:'Zài wǒmen zhège shídài, shuí dōu lí bu kāi wǎngluò hé shǒujī. Yàoshi yǒu rén duì nǐ shuō: wǒ gēnběn méiyǒu diànzǐ yóuxiāng, wǒ yě cónglái bù shǐyòng shǒujī. Nǐ huì yǒu shénme fǎnyìng? Nǐ shì bu shì huì juéde tā tài luòhòu le? Shì bu shì huì bǎ tā kàn chéng yī gè guàiwù?',
            en:'In our era, no one can do without the internet and a mobile phone. If someone told you: "I have absolutely no email address, and I have never used a mobile phone" — what would your reaction be? Wouldn\'t you think they were hopelessly behind the times? Wouldn\'t you see them as some kind of freak?'
          },
          {
            zh:'我的朋友张乐古就是这样一个"稀有动物"。他四十多岁，是个历史学教授，住在网络发达的城市，却一直拒绝网络进入自己的生活。他有一台电脑，但对他来说只是打字机。跟大多数人遇到什么问题先上网搜索不同，他选择从书中找答案。他也明白手机、电子邮箱能带来许多方便，可是他觉得自己确实不需要这些东西。他从不会像其他人那样边走边打手机。"外出时不用接电话，是多么美好的事啊！"他说。可是，不能通过手机或电子邮件与朋友联系，不是很不方便吗？他说："那又有什么关系？如果有事要跟我联系，可以给我办公室或者家里打电话，或者写信——那邮票的那种，不是发手机短信，也不是发电子邮件。"',
            py:'Wǒ de péngyou Zhāng Lègǔ jiùshì zhèyàng yī gè "xīyǒu dòngwù". Tā sìshí duō suì, shì gè lìshǐxué jiàoshòu, zhù zài wǎngluò fādá de chéngshì, què yīzhí jùjué wǎngluò jìnrù zìjǐ de shēnghuó. Tā yǒu yī tái diànnǎo, dàn duì tā lái shuō zhǐshì dǎzìjī. Gēn dà duōshù rén yùdào shénme wèntí xiān shàngwǎng sōusuǒ bùtóng, tā xuǎnzé cóng shū zhōng zhǎo dá\'àn. Tā yě míngbai shǒujī, diànzǐ yóuxiāng néng dài lái xǔduō fāngbiàn, kěshì tā juéde zìjǐ quèshí bù xūyào zhèxiē dōngxi. Tā cóng bù huì xiàng qítā rén nàyàng biān zǒu biān dǎ shǒujī. "Wàichū shí bú yòng jiē diànhuà, shì duōme měihǎo de shì a!" tā shuō. Kěshì, bù néng tōngguò shǒujī huò diànzǐ yóujiàn yǔ péngyou liánxì, bú shì hěn bù fāngbiàn ma? Tā shuō: "Nà yòu yǒu shénme guānxì? Rúguǒ yǒu shì yào gēn wǒ liánxì, kěyǐ gěi wǒ bàngōngshì huòzhě jiā lǐ dǎ diànhuà, huòzhě xiě xìn——nà yóupiào de nà zhǒng, bú shì fā shǒujī duǎnxìn, yě bú shì fā diànzǐ yóujiàn."',
            en:'My friend Zhang Legu is exactly this kind of "rare creature." He is in his forties, a history professor living in a highly connected city, yet he has always refused to let the internet into his life. He has a computer, but to him it is just a typewriter. Unlike most people who search online first when they have a question, he turns to books for answers. He understands that mobile phones and email can be very convenient, but he genuinely feels he doesn\'t need these things. He never walks around talking on his phone the way others do. "Not having to answer calls when you\'re out — isn\'t that wonderful?" he says. But can\'t he contact friends by phone or email? "What does it matter? If someone needs to reach me, they can call my office or home, or write a letter — the kind with a stamp, not a text message or an email."'
          },
          {
            zh:'说实话，我有时候很羡慕老张。他是个真正自由的人。不过，要我像他那样生活，我可做不到。',

            en:'Tell the truth, I sometimes really envy Old Zhang. He is a truly free person. But if I had to live the way he does, I really could not do it.'
          }
        ]
      }

  8: {
    texts: [
      {
        num:'§1', title:'为啥就要不合身', en:'Why Do They Have to Wear Clothes That Don\'t Fit?',
        paragraphs:[
          {
            zh:'听说有些国家还要限制人们在公共场合的穿着，我们这里的姑娘小伙子都把这当成笑话："连衣服也要管，真是的！"他们觉得，下了班，放了学，自己想穿什么就穿什么，想怎么穿就怎么穿，谁也管不着。我的朋友小虎和小琴就是这样一种人。',
            py:'Tīng shuō yǒuxiē guójiā hái yào xiànzhì rénmen zài gōnggòng chǎnghé de chuānzhuó, wǒmen zhèlǐ de gūniang xiǎohuǒzi dōu bǎ zhè dāngchéng xiàohuà: "Lián yīfu yě yào guǎn, zhēnshì de!" Tāmen juéde, xià le bān, fàng le xué, zìjǐ xiǎng chuān shénme jiù chuān shénme, xiǎng zěnme chuān jiù zěnme chuān, shuí yě guǎn bu zháo. Wǒ de péngyou Xiǎohǔ hé Xiǎoqín jiùshì zhèyàng yī zhǒng rén.',
            en:'I hear some countries even regulate what people wear in public — young people here treat that as a joke: "Controlling what you wear too? Seriously!" They feel that after work, after school, you can wear whatever you want however you want, and no one can stop you. My friends Xiaohu and Xiaoqin are exactly this kind of people.'
          },
          {
            zh:'小虎是属虎的，他已经19岁了，"是大人了"，他是坚决不穿妈妈买的衣服的，因为那些衣服"太正常"了，不够"酷"。他平时穿的裤子肥得可以装进两个人，长得一直拖到地上。爸妈当然反对，因为它太不合身了；可小虎却特别喜欢，就因为它肥得不合身，所以才很酷。',
            py:'Xiǎohǔ shì shǔ hǔ de, tā yǐjīng 19 suì le, "shì dàren le", tā shì jiānjué bù chuān māma mǎi de yīfu de, yīnwèi nàxiē yīfu "tài zhèngcháng" le, bùgòu "kù". Tā píngshí chuān de kùzi féi de kěyǐ zhuāng jìn liǎng gè rén, cháng de yīzhí tuō dào dì shàng. Bàba māma dāngrán fǎnduì, yīnwèi tā tài bù héshēn le; kě Xiǎohǔ què tèbié xǐhuān, jiù yīnwèi tā féi de bù héshēn, suǒyǐ cái hěn kù.',
            en:'Xiaohu was born in the year of the Tiger and is already 19 — "a grown-up." He absolutely refuses to wear clothes his mom buys, because they are "too normal," not cool enough. The trousers he usually wears are baggy enough to fit two people, and long enough to drag along the ground. His parents naturally object because they don\'t fit at all; but Xiaohu loves them precisely because they are so baggy and ill-fitting — that\'s exactly what makes them cool.'
          },
          {
            zh:'小琴是不穿那种裤子的，她说："那种式样，男孩子穿了是挺好看的，女孩子穿就不合适。"她爱穿那种紧身的裤子。说真的，式样确实不错，就是穿的时候实在太费力了。裤子太瘦了，要把它穿上身，得花不少时间。',
            py:'Xiǎoqín shì bù chuān nà zhǒng kùzi de, tā shuō: "Nà zhǒng shìyàng, nánháizi chuān le shì tǐng hǎokàn de, nǚháizi chuān jiù bù héshì." Tā ài chuān nà zhǒng jǐnshēn de kùzi. Shuō zhēn de, shìyàng quèshí bùcuò, jiùshì chuān de shíhòu shízài tài fèilì le. Kùzi tài shòu le, yào bǎ tā chuān shàngshēn, děi huā bùshǎo shíjiān.',
            en:'Xiaoqin doesn\'t wear that kind of trousers. She says: "That style looks quite good on boys, but it\'s not suitable for girls." She loves tight-fitting trousers. Honestly, the style really isn\'t bad — it\'s just that putting them on is incredibly hard work. The trousers are so tight that getting into them takes quite a lot of time.'
          },
          {
            zh:'他们的父母亲说起这事就怪设计师："谁设计出这种衣服，谁的脑子肯定有问题。"虽然有一肚子的意见，可是他们一点儿办法也没有。',
            py:'Tāmen de fùmǔqīn shuō qǐ zhè shì jiù guài shèjìshī: "Shuí shèjì chū zhè zhǒng yīfu, shuí de nǎozi kěndìng yǒu wèntí." Suīrán yǒu yī dùzi de yìjiàn, kěshì tāmen yīdiǎnr bànfǎ yě méiyǒu.',

            zh:'他们大多是独生子女，他们大多在快餐文化和网络文化中长大，他们是一群"活得很轻松"的人。一直以来，1980年以后和1990年以后出生的年轻人，是让社会担心的一群人。',

            py:'Zài dìzhèn zāiqū, dàochù dōu kěyǐ kàndào 20 duō suì de niánqīng zhìyuànzhě. Tāmen chéng huǒchē, qìchē cóng quánguó gè dì lái dào zāiqū, zǔchéng yī gè gè zhìyuànzhě xiǎozǔ. Nǎlǐ xūyào tāmen, tāmen jiù chūxiàn zài nǎlǐ.',

            py:'Jiàndào zhège bǎobao de rén, méiyǒu yī gè bù chī jīng de. Zhè háizi cháng cháng de tuǐ, shǒujiǎo dà de xiàng sān suì de háizi, tǐzhòng jīhū shì pǔtōng bǎobao de liǎng bèi.',

          {
            zh:'这个宝宝就是姚明。他的父母以前都是篮球运动员。他刚出生，大家就猜想到了，他将来很可能会和他父母一样，成为一名篮球运动员。不过，谁也没想到，他会成为中国最有名的篮球明星，更没想到，他还能在遥远的美国获得成功。',
            py:'Zhège bǎobao jiùshì Yáo Míng. Tā de fùmǔ yǐqián dōu shì lánqiú yùndòngyuán. Tā gāng chūshēng, dàjiā jiù cāixiǎng dào le, tā jiānglái hěn kěnéng huì hé tā fùmǔ yīyàng, chéngwéi yī míng lánqiú yùndòngyuán. Bùguò, shuí yě méi xiǎngdào, tā huì chéngwéi Zhōngguó zuì yǒumíng de lánqiú míngxīng, gèng méi xiǎngdào, tā hái néng zài yáoyuǎn de Měiguó huòdé chénggōng.',
            en:'This baby was Yao Ming. Both his parents had been basketball players. From the moment he was born, everyone guessed that he would likely follow in his parents\' footsteps and become a basketball player. But no one imagined he would become China\'s most famous basketball star — and even less that he would find success in faraway America.'

            zh:'在中国，人们常常把有运动天赋的孩子送进体育学校，让他们接受专业的体育训练。从13岁起，姚明就离开家，开始篮球训练。运动员的生活是十分艰苦的，训练也非常严格。每年除了少数几个节日，姚明几乎没有一天不是在训练馆里度过的，每天要训练8到10个小时。短短几年里，他的篮球水平进步飞快。',
            py:'Zài Zhōngguó, rénmen chángcháng bǎ yǒu yùndòng tiānfù de háizi sòng jìn tǐyù xuéxiào, ràng tāmen jiēshòu zhuānyè de tǐyù xùnliàn. Cóng 13 suì qǐ, Yáo Míng jiù líkāi jiā, kāishǐ lánqiú xùnliàn. Yùndòngyuán de shēnghuó shì shífēn jiānkǔ de, xùnliàn yě fēicháng yángé. Měi nián chúle shǎoshù jǐ gè jiérì, Yáo Míng jīhū méiyǒu yī tiān bú shì zài xùnliànguǎn lǐ dùguò de, měitiān yào xùnliàn 8 dào 10 gè xiǎoshí. Duǎnduǎn jǐ nián lǐ, tā de lánqiú shuǐpíng jìnbù fēikuài.',

        paragraphs:[
          {
            zh:'1912年，第五届奥运会在瑞典举行。南非运动员麦克阿瑟以2小时36分54秒8的成绩获得了马拉松冠军，挪威运动员奥尔森慢了1个小时，以3小时36分35秒2的成绩获第34名，是这次比赛的最后一名。54年以后，人们才知道，这次比赛的最后一名其实是日本运动员金栗志藏。原来，这里还有一段有趣的小故事呢。',
            py:'1912 nián, dì wǔ jiè Àoyùnhuì zài Ruìdiǎn jǔxíng. Nánfēi yùndòngyuán Màikè\'āshè yǐ 2 xiǎoshí 36 fēn 54 miǎo 8 de chéngjì huòdé le mǎlāsōng guànjūn, Nuówēi yùndòngyuán Àoěrsēn màn le 1 gè xiǎoshí, yǐ 3 xiǎoshí 36 fēn 35 miǎo 2 de chéngjì huò dì 34 míng, shì zhè cì bǐsài de zuìhòu yī míng. 54 nián yǐhòu, rénmen cái zhīdào, zhè cì bǐsài de zuìhòu yī míng qíshí shì Rìběn yùndòngyuán Jīnlì Zhìcáng. Yuánlái, zhèlǐ hái yǒu yī duàn yǒuqù de xiǎo gùshi ne.',

            en:'That marathon took place on an extremely hot day. Japanese athlete Kanakuri was running at the back of the pack. He suddenly noticed a spectator on the roadside drinking orange juice. Exhausted and desperately thirsty, he had no choice but to give up the race and walk over to the spectator. Although they couldn\'t communicate, Kanakuri quickly got some orange juice and even went to the spectator\'s home for a good comfortable sleep. By then, the race at the stadium had long since ended.'

            zh:'1966年，76岁的金栗又到了瑞典。他从他1912年放弃比赛的那个地点向马拉松比赛的终点——奥林匹克体育场——走去，终于走到了终点。从那次比赛的出发时间算起，已经过了54年8个月6天8小时32分20秒3。人们纷纷向他祝贺，说他创造了一个特别的"马拉松纪录"。金栗说："很抱歉，让大家久等了。我不能不承认，我跑得确实慢了点儿，不过，我觉得非常有意义。在这54年中，我找到了我的妻子，现在我有6个孩子，10个孙儿。这难道不需要时间吗？不管时间长短，每个人都会跑到终点的。"',
            py:'1966 nián, 76 suì de Jīnlì yòu dào le Ruìdiǎn. Tā cóng tā 1912 nián fàngqì bǐsài de nà gè dìdiǎn xiàng mǎlāsōng bǐsài de zhōngdiǎn——Àolínpǐkè tǐyùchǎng——zǒu qù, zhōngyú zǒu dào le zhōngdiǎn. Cóng nà cì bǐsài de chūfā shíjiān suànqǐ, yǐjīng guò le 54 nián 8 gè yuè 6 tiān 8 xiǎoshí 32 fēn 20 miǎo 3. Rénmen fēnfēn xiàng tā zhùhè, shuō tā chuàngzào le yī gè tèbié de "mǎlāsōng jìlù". Jīnlì shuō: "Hěn bàoqiàn, ràng dàjiā jiǔ děng le. Wǒ bù néng bù chéngrèn, wǒ pǎo de quèshí màn le diǎnr, bùguò, wǒ juéde fēicháng yǒu yìyì. Zài zhè 54 nián zhōng, wǒ zhǎodào le wǒ de qīzi, xiànzài wǒ yǒu 6 gè háizi, 10 gè sūn\'ér. Zhè nándào bù xūyào shíjiān ma? Bùguǎn shíjiān cháng duǎn, měi gè rén dōu huì pǎo dào zhōngdiǎn de."',
            en:'In 1966, 76-year-old Kanakuri returned to Sweden. He walked from the spot where he had abandoned the race in 1912 to the marathon finish line — the Olympic Stadium — and finally crossed it. Counting from the starting time of that race, 54 years, 8 months, 6 days, 8 hours, 32 minutes and 20.3 seconds had passed. People came forward one after another to congratulate him, saying he had set a special "marathon record." Kanakuri said: "I\'m so sorry to have kept everyone waiting. I can\'t deny that I ran rather slowly, but I feel it was very meaningful. In those 54 years, I found my wife, and now I have 6 children and 10 grandchildren. Doesn\'t that take time? No matter how long it takes, everyone will reach the finish line."'

          {
            zh:'"这其实很简单。有很多自以为一无所有的人来找我，来的时候他们确实很穷，但是走的时候个个都成了富翁。"富翁说。"您是怎么帮助他们的呢？"青年有点儿着急。"其实，我们每个人都拥有一笔巨大的财富，可是我们自己却不知道。"',

            en:'"It is actually very simple. Many people who think they own nothing come to find me — when they arrive they are truly poor, but when they leave every single one has become wealthy," said the rich man. "How do you help them?" asked the young man, a little anxious. "In fact, every one of us possesses a great fortune — we just don\'t know it."'

            zh:'"它到底在哪里呢？""就在你身上。比如说，你的一双眼睛。你要是愿意给我一只眼睛的话，我就可以付给你一百万。""不，眼睛不能给您！"青年立刻叫了起来。',
            py:'"Tā dàodǐ zài nǎlǐ ne?" "Jiù zài nǐ shēnshang. Bǐrú shuō, nǐ de yī shuāng yǎnjīng. Nǐ yàoshi yuànyì gěi wǒ yī zhī yǎnjīng de huà, wǒ jiù kěyǐ fù gěi nǐ yī bǎi wàn." "Bù, yǎnjīng bù néng gěi nín!" Qīngnián lìkè jiào le qǐlái.',
            en:'"Where on earth is it?" "Right there on you. For example, your two eyes. If you were willing to give me one eye, I could pay you one million." "No, I cannot give you my eyes!" the young man immediately cried out.'

          {
            zh:'"好吧，既然你不肯，那就算了。那么，我就要你的一双手吧！它们值两百万。""不，那也不行！"青年坚决地说。',
            py:'"Hǎo ba, jìrán nǐ bù kěn, nà jiù suàn le. Nàme, wǒ jiù yào nǐ de yī shuāng shǒu ba! Tāmen zhí liǎng bǎi wàn." "Bù, nà yě bù xíng!" Qīngnián jiānjué de shuō.',
            en:'"All right, since you\'re not willing, forget it. Then how about your two hands — they\'re worth two million." "No, that won\'t do either!" the young man said firmly.'

          {
            zh:'"你看，我一说你就明白了。有一双眼睛，你就可以学习；有一双手，你就可以劳动。现在你看到了吧，你拥有多么巨大的财富啊！这就是我的秘诀。"青年告别了富翁，充满信心地走了出去。他似乎觉得自己已经成了一个富翁了。',

            en:'"You see, the moment I said it you understood. With two eyes you can study; with two hands you can work. Now you see — what enormous wealth you possess! That is my secret." The young man said goodbye to the rich man and walked out full of confidence. He seemed to feel that he had already become a wealthy man.'

        paragraphs:[
          {
            zh:'我每个星期都买彩票。既然买彩票，当然希望中奖，最好是中个大奖。可是我运气不好，这几年得到的奖品虽然不少，可始终都是小东西，不是毛巾，就是肥皂，没有更大的了。',

            en:'I buy lottery tickets every week. Since I buy lottery tickets, I naturally hope to win — ideally a big prize. But my luck isn\'t good. Over the past few years I\'ve received quite a few prizes, but they have always been small things — either a towel or a bar of soap, nothing bigger.'

            zh:'不过，这不等于说我永远中不了大奖，说不定明天运气突然就来了呢！如果我中了500万——当然，去掉税，还剩400万——我打算这么花：先拿出120万买套房子。现在我们一家三代五口人才住四十几平方米，实在太挤了，做梦也想住得舒适一些。房价年年在涨，看来，只有等我中了大奖，才有可能实现这个梦想。',
            py:'Bùguò, zhè bù děngyú shuō wǒ yǒngyuǎn zhòng bu liǎo dà jiǎng, shuōbudìng míngtiān yùnqi tūrán jiù lái le ne! Rúguǒ wǒ zhòng le 500 wàn——dāngrán, qùdiào shuì, hái shèng 400 wàn——wǒ dǎsuàn zhème huā: xiān ná chū 120 wàn mǎi tào fángzi. Xiànzài wǒmen yī jiā sān dài wǔ kǒu rén cái zhù sìshí jǐ píngfāngmǐ, shízài tài jǐ le, zuò mèng yě xiǎng zhù de shūshì yīxiē. Fáng jià niánnián zài zhǎng, kàn lái, zhǐyǒu děng wǒ zhòng le dà jiǎng, cái yǒu kěnéng shíxiàn zhège mèngxiǎng.',
            en:'But this is not to say I\'ll never win a big prize — maybe my luck will suddenly come tomorrow! If I won 5 million — of course, after deducting tax there would be 4 million left — I plan to spend it like this: first, take out 1.2 million to buy a home. Right now five of us — three generations — are crammed into just over forty square metres, which is really too tight. I dream of living more comfortably. House prices go up every year, so it seems only by winning a big prize could this dream come true.'
          },
          {
            zh:'然后再买辆车。不用很高级，十几万的就行。再拿出10万给全家人都买一份保险，拿出5万帮助我哥的孩子上大学，拿出5万给我父母。拿出50万捐给穷人，或者，为他们的孩子建一所希望小学。',
            py:'Ránhòu zài mǎi liàng chē. Bú yòng hěn gāojí, shí jǐ wàn de jiù xíng. Zài ná chū 10 wàn gěi quánjiā rén dōu mǎi yī fèn bǎoxiǎn, ná chū 5 wàn bāngzhù wǒ gē de háizi shàng dàxué, ná chū 5 wàn gěi wǒ fùmǔ. Ná chū 50 wàn juān gěi qióngrén, huòzhě, wèi tāmen de háizi jiàn yī suǒ xīwàng xiǎoxué.',
            en:'Then buy a car — nothing too fancy, around 100,000 will do. Spend another 100,000 on insurance for the whole family, 50,000 to help my brother\'s child go to university, and 50,000 for my parents. Use 500,000 to donate to the poor, or to build a Hope Primary School for their children.'
          },
          {
            zh:'拿出100万，开个公司。我一直都有自己创业的想法，可是，由于没钱，现在只能做点儿小生意。如果有了这么一大笔钱，我的创业计划就能实现了。留50万给孩子，将来孩子上大学呀，读研究生呀，出国留学呀，都免不了要花钱。最后，带着全家人到欧洲旅游一次。剩下的钱存银行。',
            py:'Ná chū 100 wàn, kāi gè gōngsī. Wǒ yīzhí dōu yǒu zìjǐ chuàngyè de xiǎngfǎ, kěshì, yóuyú méi qián, xiànzài zhǐ néng zuò diǎnr xiǎo shēngyì. Rúguǒ yǒu le zhème yī dà bǐ qián, wǒ de chuàngyè jìhuà jiù néng shíxiàn le. Liú 50 wàn gěi háizi, jiānglái háizi shàng dàxué ya, dú yánjiūshēng ya, chū guó liúxué ya, dōu miǎnbuliǎo yào huā qián. Zuìhòu, dài zhe quánjiā rén dào Ōuzhōu lǚyóu yī cì. Shèngxia de qián cún yínháng.',

        examples:[

      {
        num:'§1', title:'幸福是拥有一个快乐的厨房', en:'Happiness Is Having a Happy Kitchen',
        paragraphs:[
          {
            zh:'尽管每天在单位里很忙很累，但下班回家后我还是喜欢走进厨房。',
            py:'Jǐnguǎn měitiān zài dānwèi lǐ hěn máng hěn lèi, dàn xià bān huí jiā hòu wǒ háishì xǐhuān zǒu jìn chúfáng.',
            en:'Despite being busy and tired at work every day, I still like to walk into the kitchen after getting home from work.'

          {
            zh:'我知道，肯定有不少人会笑我。那些笑我的肯定都是女人，而且是自以为优秀的女人。在她们眼里，一个现代女性，喜欢在厨房里忙忙碌碌，是没有出息的。',
            py:'Wǒ zhīdào, kěndìng yǒu bù shǎo rén huì xiào wǒ. Nàxiē xiào wǒ de kěndìng dōu shì nǚrén, érqiě shì zìyǐwéi yōuxiù de nǚrén. Zài tāmen yǎnlǐ, yī gè xiàndài nǚxìng, xǐhuān zài chúfáng lǐ mángmánglùlù, shì méiyǒu chūxi de.',
            en:'I know that quite a few people will laugh at me. Those who laugh at me are surely all women — and women who think of themselves as outstanding at that. In their eyes, a modern woman who enjoys bustling about in the kitchen has no future.'
          },
          {
            zh:'不过，我还是喜欢走进厨房，因为我喜欢我们家厨房里那种温馨、和谐的气氛。每天晚上，我做菜的时候，先生和女儿也先后回家了。他们往往也会进来，一边看我做菜，一边聊聊一天的工作，有时，他们也帮我干点儿活儿。厨房里欢声笑语不断，这是一天里最热闹的时候。',
            py:'Búguò, wǒ háishì xǐhuān zǒu jìn chúfáng, yīnwèi wǒ xǐhuān wǒmen jiā chúfáng lǐ nà zhǒng wēnxīn, héxié de qìfēn. Měitiān wǎnshang, wǒ zuò cài de shíhòu, xiānsheng hé nǚ\'ér yě xiānhòu huí jiā le. Tāmen wǎngwǎng yě huì jìnlái, yībiān kàn wǒ zuò cài, yībiān liáoliao yītiān de gōngzuò, yǒushí, tāmen yě bāng wǒ gàn diǎnr huór. Chúfáng lǐ huān shēng xiào yǔ bùduàn, zhè shì yītiān lǐ zuì rènào de shíhòu.',
            en:'But I still like walking into the kitchen, because I enjoy the cosy, harmonious atmosphere in our kitchen. Every evening when I am cooking, my husband and daughter come home one after another. They often come in too, watching me cook while chatting about the day\'s work; sometimes they help me with a few chores. The kitchen is filled with cheerful chatting and laughing — it is the liveliest time of the day.'
          },
          {
            zh:'其实，除了少数几样拿手菜，我做菜的水平并不高，可当饭菜端上桌的时候，全家人都吃得津津有味。看着他们满意的样子，我就忘记了一天的疲劳。',
            py:'Qíshí, chúle shǎoshù jǐ yàng náshǒu cài, wǒ zuò cài de shuǐpíng bìng bù gāo, kě dāng fàncài duān shàng zhuō de shíhòu, quán jiā rén dōu chī de jīnjīn yǒuwèi. Kànzhe tāmen mǎnyì de yàngzi, wǒ jiù wàngjì le yītiān de píláo.',
            en:'In fact, apart from a few dishes I am good at, my cooking is not that skilled — yet when the food is carried to the table, the whole family eats with great relish. Seeing them satisfied, I forget the fatigue of the whole day.'
          },

            py:'Wǒ ài chúfáng, wǒ bǎ duì jiārén de gǎnqíng dōu zuò jìn fàncài lǐ, ràng tāmen màn màn pǐncháng. Wǒ bǎ quán jiā rén de huān shēng xiào yǔ zuò jìn fàncài lǐ, ràng tāmen chī de jīnjīn yǒuwèi. Ài chúfáng de nǚrén, qíshí gèng shì ài jiā, ài shēnghuó de rén. Yōngyǒu yī gè kuàilè de chúfáng, jiùshì yōngyǒu xìngfú.',

        paragraphs:[
          {
            zh:'宋先生的妻子张女士是一家保险公司的经理，十分能干，工作很忙，收入也很高。有了孩子以后，张女士就更辛苦了。为了让妻子一心一意干事业，宋先生干脆辞了职，在家里做起了"全职先生"。他整天在家里忙忙碌碌，不但要洗衣、做饭、搞卫生、带孩子，而且还要照顾七十多岁的老母亲，一点儿也不轻松。',
            py:'Sòng xiānsheng de qīzi Zhāng nǚshì shì yī jiā bǎoxiǎn gōngsī de jīnglǐ, shífēn nénggàn, gōngzuò hěn máng, shōurù yě hěn gāo. Yǒu le háizi yǐhòu, Zhāng nǚshì jiù gèng xīnkǔ le. Wèile ràng qīzi yīxīnyīyì gàn shìyè, Sòng xiānsheng gāncuì cí le zhí, zài jiālǐ zuò qǐ le "quánzhí xiānsheng". Tā zhěngtiān zài jiālǐ mángmánglùlù, búdàn yào xǐyī, zuòfàn, gǎo wèishēng, dài háizi, érqiě hái yào zhàogù qīshí duō suì de lǎo mǔqīn, yīdiǎnr yě bù qīngsōng.',
            en:'Mr. Song\'s wife Ms. Zhang is the manager of an insurance company — very capable, very busy, and with a high income. After having a child, Ms. Zhang\'s life became even harder. So that his wife could devote herself wholeheartedly to her career, Mr. Song simply quit his job and became a "full-time husband" at home. He bustles about all day long — not only does he have to do laundry, cook, clean, and look after the child, but he also has to care for his elderly mother in her seventies. It is not easy at all.'

            zh:'做"全职先生"比做"全职太太"需要更大的勇气。宋先生说，不管谁在外面挣钱，在家里做家务，对这个家庭来说，其实意义都是一样的。在家里做全职先生，他不觉得丢面子。只要夫妻俩互相理解、互相尊重，一家人和谐快乐，自己就满足了，别人说什么都无所谓。',
            py:'Zuò "quánzhí xiānsheng" bǐ zuò "quánzhí tàitai" xūyào gèng dà de yǒngqì. Sòng xiānsheng shuō, bùguǎn shéi zài wàimiàn zhèng qián, zài jiālǐ zuò jiāwù, duì zhège jiātíng lái shuō, qíshí yìyì dōu shì yīyàng de. Zài jiālǐ zuò quánzhí xiānsheng, tā bù juéde diū miànzi. Zhǐyào fūqī liǎ hùxiāng lǐjiě, hùxiāng zūnzhòng, yījiā rén héxié kuàilè, zìjǐ jiù mǎnzú le, biérén shuō shénme dōu wúsuǒwèi.',
            en:'Being a "full-time husband" takes greater courage than being a "full-time wife." Mr. Song says that regardless of who earns money outside and who does housework at home, for this family the meaning is actually the same. Being a full-time husband at home, he does not feel he has lost face. As long as husband and wife understand and respect each other, and the family is harmonious and happy, he is content — whatever others say does not matter.'
          },
          {
            zh:'张女士对丈夫的支持非常感激。她说："我不觉得我先生待在家里是没出息的，他其实很有能力的。等孩子上了幼儿园，他肯定能重新找到一份工作，而且干得很成功。"',
            py:'Zhāng nǚshì duì zhàngfu de zhīchí fēicháng gǎnjī. Tā shuō: "Wǒ bù juéde wǒ xiānsheng dāi zài jiālǐ shì méi chūxi de, tā qíshí hěn yǒu nénglì de. Děng háizi shàng le yòu\'éryuán, tā kěndìng néng chóngxīn zhǎodào yī fèn gōngzuò, érqiě gàn de hěn chénggōng."',
            en:'Ms. Zhang is very grateful for her husband\'s support. She says: "I don\'t think my husband staying home means he has no prospects — he is actually very capable. Once the child starts kindergarten, he will definitely be able to find a new job, and do very well at it."'

          {
            zh:'星期天，宋先生休息，他什么家务都不做。白天，两口子一起带上孩子去公园玩，晚上，张女士请全家人到饭馆去吃晚饭。不过，每次吃完饭付账的时候，宋先生总是悄悄地把钱从太太手里夺过来，自己"抢"着去付账。',
            py:'Xīngqītiān, Sòng xiānsheng xiūxi, tā shénme jiāwù dōu bù zuò. Báitiān, liǎngkǒuzi yīqǐ dài shàng háizi qù gōngyuán wán, wǎnshang, Zhāng nǚshì qǐng quán jiā rén dào fànguǎn qù chī wǎnfàn. Búguò, měi cì chī wán fàn fù zhàng de shíhòu, Sòng xiānsheng zǒngshì qiāoqiāo de bǎ qián cóng tàitai shǒu lǐ duó guòlái, zìjǐ "qiǎng" zhe qù fù zhàng.',

          }

          {
